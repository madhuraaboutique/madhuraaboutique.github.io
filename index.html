<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>StyleLoop | Luxury Boutique</title>
</head>
<body style="margin:0; background:#0a0e1a; color:#fff; display:flex; align-items:center; justify-content:center; height:100vh; font-family:sans-serif; flex-direction:column; gap:16px;">

<div id="boot-msg">
  <div style="font-size:2.5rem; text-align:center;">✨</div>
  <div style="text-align:center; margin-top:12px;">Loading StyleLoop...</div>
</div>

<script>
(function() {
    // Simple, clean boot sequence
    // 1. Load the correct template JS (sets window.SHOP_HTML_TEMPLATE)
    // 2. Write that HTML to the document
    // 3. Done — no loops because we only run if #boot-msg exists

    if (!document.getElementById('boot-msg')) return; // prevent re-entry

    function fail(msg) {
        document.getElementById('boot-msg').innerHTML =
            '<div style="text-align:center; max-width:380px;">' +
            '<h3 style="color:#f87171; margin-bottom:10px;">&#9888; Shop Not Ready</h3>' +
            '<p style="color:#9ca3af; font-size:14px; margin-bottom:15px;">' + msg + '</p>' +
            '<p style="color:#6b7280; font-size:12px; text-align:left; background:#111827; padding:12px; border-radius:8px; margin-bottom:15px;">' +
            '<b style="color:#fff;">Steps:</b><br>' +
            '1. Open index.html<br>2. Add products<br>3. Online Store &rarr; Preview<br>4. Refresh here' +
            '</p>' +
            '<button onclick="location.reload()" style="background:#db2777; color:#fff; border:none; padding:10px 22px; border-radius:6px; cursor:pointer; font-weight:700;">Retry</button>' +
            '</div>';
    }

    var src = 'js/shop-template.js';

    var s = document.createElement('script');
    s.src = src;
    s.onerror = function() { fail('Could not load template file: ' + src); };
    s.onload  = function() {
        if (!window.SHOP_HTML_TEMPLATE) {
            fail('Template file loaded but SHOP_HTML_TEMPLATE is not set. There may be a syntax error in ' + src + '.');
            return;
        }

        // We use document.write because it is the only way to ensure 
        // that scripts inside the template are executed immediately.
        try {
            document.open();
            document.write(window.SHOP_HTML_TEMPLATE);
            document.close();
        } catch (e) {
            fail('Fatal error during document replacement: ' + e.message);
        }
    };
    document.head.appendChild(s);
})();
</script>
</body>
</html>
