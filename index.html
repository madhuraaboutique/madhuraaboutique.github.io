<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="description" content="Browse Mg Madhuraa Boutique's premium product catalog â€” search, filter, and inquire via WhatsApp.">
<title>Mg Madhuraa Boutique | Catalog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:'Outfit',system-ui,sans-serif;background:#09090b;color:#f8fafc;line-height:1.5;overflow-x:hidden;-webkit-font-smoothing:antialiased}
:root{--bg:#09090b;--bg2:#18181b;--card:#27272a;--acc:#6366f1;--acc2:#ec4899;--glow:rgba(99,102,241,0.25);--txt:#f8fafc;--txt2:#94a3b8;--muted:#475569;--err:#f43f5e;--ok:#10b981;--bdr:rgba(255,255,255,0.08);--bdr2:rgba(99,102,241,0.3);--r:12px;--r2:18px;--rf:9999px;--sh:0 10px 30px rgba(0,0,0,0.5);--tr:all 0.3s cubic-bezier(0.4,0,0.2,1)}

/* Custom Scrollbar */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--muted); border-radius: var(--rf); }
::-webkit-scrollbar-thumb:hover { background: var(--txt2); }

/* â•â•â• NAVBAR (Premium Glassmorphism) â•â•â• */
.topnav{position:sticky;top:0;z-index:200;height:70px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;gap:15px;background:rgba(9,9,11,0.8);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--bdr);}
.brand{font-size:1.4rem;font-weight:800;background:linear-gradient(to right,#fff,var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap;flex-shrink:0;line-height:1.1;letter-spacing:-0.5px;}
.brand small{display:block;font-size:0.65rem;-webkit-text-fill-color:var(--txt2);font-weight:500;letter-spacing:1px;text-transform:uppercase;margin-top:2px;}
.srchwrap{flex:1;position:relative;max-width:450px;margin:0 auto}
.srchwrap input{width:100%;height:42px;padding:0 16px 0 40px;background:rgba(255,255,255,0.04);border:1px solid var(--bdr);border-radius:var(--rf);color:var(--txt);font-family:inherit;font-size:0.9rem;transition:var(--tr)}
.srchwrap input:focus{outline:none;border-color:var(--acc);background:rgba(255,255,255,0.08);box-shadow:0 0 0 4px var(--glow)}
.srchwrap input::placeholder{color:var(--txt2)}
.srchwrap .si{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--txt2);font-size:1rem;pointer-events:none}
.fab{position:relative;flex-shrink:0;height:42px;padding:0 16px;background:linear-gradient(135deg,var(--acc),#818cf8);border-radius:var(--rf);display:flex;align-items:center;gap:8px;cursor:pointer;border:none;font-size:0.9rem;font-weight:700;color:#fff;transition:var(--tr);box-shadow:0 4px 15px var(--glow);font-family:inherit;}
.fab:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(99,102,241,0.4);filter:brightness(1.1);}
.fab.hide{display:none}
.fbadge{background:var(--err);color:#fff;font-size:0.75rem;font-weight:800;padding:2px 8px;border-radius:var(--rf);min-width:24px;text-align:center;}

@media(max-width: 600px) {
  .topnav { height: 120px; flex-wrap: wrap; padding: 12px 16px; justify-content: center; }
  .brand { flex: 1; text-align: left; }
  .srchwrap { order: 3; width: 100%; max-width: 100%; margin-top: 10px; }
  .fab { flex-shrink: 0; }
}

/* â•â•â• CATEGORY BAR â•â•â• */
.catbar{position:sticky;top:70px;z-index:190;background:rgba(9,9,11,0.9);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--bdr);padding:12px 20px;display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;}
@media(max-width:600px){.catbar{top:120px;}}
.catbar::-webkit-scrollbar{display:none}
.cbtn{flex-shrink:0;padding:8px 18px;background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--rf);color:var(--txt2);font-size:0.85rem;font-weight:600;font-family:inherit;cursor:pointer;transition:var(--tr);white-space:nowrap;display:flex;align-items:center;gap:6px;}
.cbtn:hover{border-color:var(--acc);color:var(--txt);background:rgba(99,102,241,0.1);}
.cbtn.active{background:linear-gradient(135deg,var(--acc),#818cf8);color:#fff;border-color:transparent;box-shadow:0 4px 12px var(--glow)}

/* â•â•â• MAIN & GRID â•â•â• */
.main{padding:24px 20px 80px; max-width: 1600px; margin: 0 auto;}
.pbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.pcnt{font-size:0.9rem;color:var(--txt2);font-weight:500;letter-spacing:0.5px;}
.pcnt span{color:var(--txt);font-weight:800;background:var(--bg2);padding:2px 8px;border-radius:6px;border:1px solid var(--bdr);}

.pgrid{display:grid;grid-template-columns:repeat(auto-fill, minmax(240px, 1fr));gap:24px}
@media(max-width: 500px) { .pgrid{grid-template-columns:repeat(2, 1fr);gap:12px} }

/* â•â•â• PREMIUM PRODUCT CARD â•â•â• */
.pcard{background:var(--card);border-radius:var(--r2);overflow:hidden;border:1px solid var(--bdr);transition:var(--tr);cursor:pointer;position:relative;display:flex;flex-direction:column;}
.pcard:hover{transform:translateY(-6px);border-color:var(--bdr2);box-shadow:var(--sh);}
/* Image Area */
.pimg-box{position:relative;aspect-ratio:4/5;overflow:hidden;background:#111;}
.pimg{width:100%;height:100%;object-fit:cover;transition:transform 0.6s cubic-bezier(0.4,0,0.2,1);display:block}
.pcard:hover .pimg{transform:scale(1.08)}
.pno-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:4rem;opacity:0.2;}
/* Badges */
.pcode{position:absolute;top:12px;left:12px;z-index:2;padding:4px 10px;border-radius:6px;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);font-size:0.75rem;font-weight:800;color:#fff;letter-spacing:1px;border:1px solid rgba(255,255,255,0.15);}
.sbadge{position:absolute;top:12px;right:12px;z-index:2;background:rgba(244,63,94,0.9);color:#fff;padding:4px 10px;border-radius:6px;font-size:0.7rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;backdrop-filter:blur(4px);}
/* Hover Add */
.povlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.9) 0%,rgba(0,0,0,0) 60%);display:flex;align-items:flex-end;padding:16px;opacity:0;transition:var(--tr)}
.pcard:hover .povlay{opacity:1}
@media(max-width: 768px) { .povlay{opacity:1; background:linear-gradient(to top,rgba(0,0,0,0.85) 0%,rgba(0,0,0,0) 40%);} }
.qvbtn{width:100%;padding:10px;background:#fff;color:#000;border:none;border-radius:var(--r);font-size:0.8rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;cursor:pointer;font-family:inherit;transition:var(--tr);}
.qvbtn:hover{background:var(--acc);color:#fff; transform:scale(1.02);}

/* Detail Info */
.pinfo{padding:16px;display:flex;flex-direction:column;flex:1;}
.pcat{font-size:0.65rem;text-transform:uppercase;letter-spacing:2px;color:var(--acc);font-weight:800;margin-bottom:6px}
.pname{font-size:1.05rem;font-weight:700;color:var(--txt);margin-bottom:8px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.cdots{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;min-height:16px;align-items:center;}
.cdot{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);box-shadow:0 2px 5px rgba(0,0,0,0.5);}
.pftr{display:flex;justify-content:space-between;align-items:flex-end;margin-top:auto;}
.pprice{font-size:1.2rem;font-weight:800;color:#fff;letter-spacing:0.5px;}

/* â•â•â• MODALS & OVERLAYS â•â•â• */
.mover{position:fixed;inset:0;background:rgba(0,0,0,0.9);backdrop-filter:blur(15px);-webkit-backdrop-filter:blur(15px);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;overscroll-behavior:contain;opacity:0;transition:opacity 0.3s ease;}
.mover.open{display:flex;opacity:1;}
.modal{background:var(--card);width:100%;border-radius:24px;border:1px solid var(--bdr);overflow:hidden;max-height:90vh;display:flex;flex-direction:column;transform:scale(0.95) translateY(20px);transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 25px 50px -12px rgba(0,0,0,0.8);}
.mover.open .modal{transform:scale(1) translateY(0);}
.modal.sm{max-width:480px}
.modal.lg{max-width:1000px}

/* Modal Headers */
.mhdr{padding:20px 24px;border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:flex-start;background:rgba(255,255,255,0.02);}
.mhdr h3{font-size:1.2rem;font-weight:800;}
.mcode{font-size:0.75rem;color:var(--acc);font-family:monospace;font-weight:700;margin-top:4px;letter-spacing:1px;background:rgba(99,102,241,0.1);padding:4px 8px;border-radius:6px;display:inline-block;}
.mclose{background:rgba(255,255,255,0.05);border:1px solid var(--bdr);color:var(--txt2);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;transition:var(--tr);}
.mclose:hover{background:var(--err);color:#fff;border-color:var(--err);transform:rotate(90deg);}

.mbody{overflow-y:auto;flex:1;padding:0;scrollbar-width: thin; scrollbar-color: var(--muted) transparent;}

/* Detail Modal Split */
.dg{display:flex;flex-direction:row;}
@media(max-width: 800px) { .dg{flex-direction:column;} }
.dgal{flex:1;padding:24px;background:#111;display:flex;flex-direction:column;gap:16px;border-right:1px solid var(--bdr);}
.mimg{width:100%;border-radius:16px;object-fit:contain;background:#000;display:block;max-height:60vh;border:1px solid var(--bdr);}
.mph{display:flex;align-items:center;justify-content:center;font-size:6rem;border-radius:16px;background:#111;min-height:300px}
.thumbrow{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;}
.thumb{width:64px;height:64px;border-radius:12px;object-fit:cover;cursor:pointer;border:2px solid transparent;transition:var(--tr);opacity:0.6;}
.thumb:hover{opacity:1;}
.thumb.active{border-color:var(--acc);opacity:1;box-shadow:0 0 0 3px var(--glow);}

.dinfo{width:420px;padding:30px 24px;display:flex;flex-direction:column;gap:20px;background:var(--card);overflow-y:auto;}
@media(max-width: 800px) { .dinfo{width:100%;} }
.dtag{font-size:0.75rem;text-transform:uppercase;letter-spacing:2px;color:var(--txt2);font-weight:700;}
.dname{font-size:1.8rem;font-weight:800;color:#fff;line-height:1.2;margin:4px 0;}
.dprice{font-size:2rem;font-weight:800;color:var(--acc);margin-top:4px;}
.ddesc{color:var(--txt2);font-size:0.95rem;line-height:1.7;}

.sec-t{font-size:0.75rem;text-transform:uppercase;letter-spacing:2px;color:var(--txt);font-weight:800;margin-bottom:12px;border-bottom:1px solid var(--bdr);padding-bottom:8px;}
.szrow{display:flex;flex-wrap:wrap;gap:10px}
.sz{padding:8px 16px;background:rgba(255,255,255,0.05);border:1px solid var(--bdr);border-radius:8px;font-size:0.9rem;font-weight:700;color:var(--txt2);transition:var(--tr);}
.sz.active, .sz:hover{border-color:var(--acc);color:#fff;background:rgba(99,102,241,0.15);box-shadow:0 4px 10px var(--glow);}
.colorlist{display:flex;flex-wrap:wrap;gap:10px}
.ctag{font-size:0.85rem;padding:6px 14px;background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--rf);font-weight:600;display:flex;align-items:center;gap:8px;}
.cdotl{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);}

/* Actions & Footer */
.dacts{display:flex;gap:12px;margin-top:auto;padding-top:20px;}
.btn{flex:1;padding:14px 20px;border-radius:12px;font-weight:800;cursor:pointer;transition:var(--tr);border:none;font-size:0.9rem;font-family:inherit;display:inline-flex;align-items:center;justify-content:center;gap:8px;text-transform:uppercase;letter-spacing:1px;}
.btn-p{background:linear-gradient(135deg,var(--acc),#818cf8);color:#fff;box-shadow:0 6px 20px var(--glow);}
.btn-p:hover{transform:translateY(-3px);box-shadow:0 8px 25px rgba(99,102,241,0.5);}
.btn-wa{background:linear-gradient(135deg,#25d366,#128c7e);color:#fff;box-shadow:0 6px 20px rgba(37,211,102,0.3);}
.btn-wa:hover{transform:translateY(-3px);box-shadow:0 8px 25px rgba(37,211,102,0.5);}
.btn-s{background:rgba(255,255,255,0.05);color:#fff;border:1px solid var(--bdr);}
.btn-s:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2);}

/* Inquiry List */
.mftr{padding:20px 24px;border-top:1px solid var(--bdr);display:flex;gap:12px;background:rgba(255,255,255,0.02);}
.iqi{display:flex;align-items:center;gap:16px;padding:16px;border-bottom:1px solid var(--bdr);transition:var(--tr);background:var(--bg2);margin:10px 24px;border-radius:12px;}
.iqi:last-child{margin-bottom:20px;}
.iqth{width:70px;height:70px;border-radius:10px;object-fit:cover;border:1px solid var(--bdr);}
.iqinfo{flex:1;min-width:0}
.iqname{font-weight:800;font-size:1rem;margin-bottom:4px;}
.iqcode{font-size:0.75rem;color:var(--acc);font-family:monospace;font-weight:700;}
.iqrm{background:rgba(244,63,94,0.1);color:var(--err);border:1px solid rgba(244,63,94,0.2);cursor:pointer;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:var(--tr);font-size:0.9rem;}
.iqrm:hover{background:var(--err);color:#fff;transform:scale(1.1);}

/* States & Toasts */
.state{padding:60px 20px;text-align:center;color:var(--txt2);font-weight:600;}
.state h3{font-size:1.4rem;color:#fff;margin-bottom:10px;}
.spinner{width:46px;height:46px;border:4px solid rgba(255,255,255,0.1);border-top-color:var(--acc);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 20px;}
@keyframes spin{to{transform:rotate(360deg)}}
.tc{position:fixed;bottom:30px;right:30px;z-index:3000;display:flex;flex-direction:column;gap:10px;pointer-events:none;}
.toast{background:var(--card);color:#fff;padding:14px 20px;border-radius:12px;border-left:4px solid var(--acc);box-shadow:var(--sh);font-size:0.9rem;font-weight:700;animation:tin 0.4s cubic-bezier(0.18,0.89,0.32,1.28), tout 0.3s ease 3s both;}
@keyframes tin{from{opacity:0;transform:translateX(40px) scale(0.9)}to{opacity:1;transform:none}}
@keyframes tout{from{opacity:1;transform:none}to{opacity:0;transform:translateY(10px) scale(0.95)}}

/* FOOTER */
.ftr{border-top:1px solid var(--bdr);padding:60px 20px;background:var(--bg2);}
.fgrid{display:grid;grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));gap:40px;max-width:1200px;margin:0 auto}
.fbn{font-size:1.5rem;font-weight:800;margin-bottom:10px;background:linear-gradient(to right,#fff,var(--acc2));-webkit-background-clip:text;background-clip:text;color:transparent;}
.fcol h5{font-size:0.8rem;text-transform:uppercase;letter-spacing:2px;color:var(--acc);margin-bottom:16px}
.fcol p,.fcol a{color:var(--txt2);font-size:0.9rem;margin-bottom:10px;display:block;text-decoration:none;transition:var(--tr);font-weight:500;}
.fcol a:hover{color:#fff;transform:translateX(5px);}
.fbot{text-align:center;color:var(--txt2);font-size:0.8rem;margin-top:60px;padding-top:24px;border-top:1px solid var(--bdr);font-weight:600;}

/* ═══ FILTER SYSTEM ═══ */
.filterbar{background:rgba(9,9,11,0.97);border-bottom:1px solid var(--bdr);padding:10px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:119px;z-index:180;}
@media(max-width:600px){.filterbar{top:168px;}}
.fbtn{display:flex;align-items:center;gap:6px;padding:7px 14px;background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--rf);color:var(--txt2);font-size:0.82rem;font-weight:700;cursor:pointer;transition:var(--tr);font-family:inherit;white-space:nowrap;}
.fbtn:hover{border-color:var(--acc);color:var(--txt);}
.fbtn.on{background:rgba(99,102,241,0.15);border-color:var(--acc);color:#fff;}
.fbadge2{background:var(--acc);color:#fff;font-size:0.65rem;font-weight:800;padding:1px 6px;border-radius:var(--rf);min-width:18px;text-align:center;}
.fchip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:rgba(99,102,241,0.12);border:1px solid rgba(99,102,241,0.3);border-radius:var(--rf);font-size:0.78rem;font-weight:700;color:var(--acc);cursor:pointer;transition:var(--tr);}
.fchip .fx{margin-left:2px;opacity:0.7;font-size:0.75rem;}
.fchip:hover .fx{opacity:1;color:var(--err);}
.fclear{padding:6px 12px;background:transparent;border:1px solid rgba(244,63,94,0.3);border-radius:var(--rf);color:var(--err);font-size:0.8rem;font-weight:700;cursor:pointer;transition:var(--tr);font-family:inherit;}
.fclear:hover{background:rgba(244,63,94,0.1);border-color:var(--err);}
.sort-sel{padding:7px 12px;background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--rf);color:var(--txt);font-size:0.82rem;font-weight:600;cursor:pointer;font-family:inherit;outline:none;transition:var(--tr);}
.sort-sel:focus{border-color:var(--acc);}

/* Filter Drawer */
.fdrawer{background:var(--bg2);border:1px solid var(--bdr);border-radius:16px;padding:20px;margin:0 20px 0;display:none;box-shadow:0 10px 40px rgba(0,0,0,0.5);}
.fdrawer.open{display:block;animation:tin 0.25s ease;}
.fgroup{margin-bottom:18px;}
.fgroup:last-child{margin-bottom:0;}
.fglabel{font-size:0.7rem;text-transform:uppercase;letter-spacing:2px;color:var(--acc);font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.fchips{display:flex;flex-wrap:wrap;gap:6px;}
.fopt{padding:4px 10px;background:rgba(255,255,255,0.04);border:1px solid var(--bdr);border-radius:var(--rf);font-size:0.75rem;font-weight:600;color:var(--txt2);cursor:pointer;transition:var(--tr);font-family:inherit;display:flex;align-items:center;gap:6px;}
.fopt:hover{border-color:var(--acc);color:var(--txt);}
.fopt.sel{background:rgba(99,102,241,0.15);border-color:var(--acc);color:#fff;}
.cdot-f{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);flex-shrink:0;}
.pr-row{display:flex;gap:12px;align-items:center;}
.pr-inp{width:110px;padding:8px 12px;background:rgba(255,255,255,0.05);border:1px solid var(--bdr);border-radius:var(--r);color:var(--txt);font-size:0.88rem;font-family:inherit;outline:none;transition:var(--tr);}
.pr-inp:focus{border-color:var(--acc);}
.avail-toggle{display:flex;gap:8px;}
.avbtn{padding:7px 18px;background:rgba(255,255,255,0.04);border:1px solid var(--bdr);border-radius:var(--rf);font-size:0.82rem;font-weight:700;cursor:pointer;transition:var(--tr);font-family:inherit;color:var(--txt2);}
.avbtn.sel{background:rgba(16,185,129,0.15);border-color:var(--ok);color:var(--ok);}
.avbtn.sel-so{background:rgba(244,63,94,0.1);border-color:var(--err);color:var(--err);}
.fdivider{height:1px;background:var(--bdr);margin:16px 0;}

/* Share Button Row */
.share-row{display:flex;gap:10px;flex-wrap:wrap;padding-top:16px;border-top:1px solid var(--bdr);margin-top:8px;}
.share-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--rf);font-size:0.8rem;font-weight:700;cursor:pointer;transition:var(--tr);border:1px solid var(--bdr);font-family:inherit;background:var(--bg2);color:var(--txt2);text-decoration:none;}
.share-btn:hover{transform:translateY(-2px);border-color:var(--acc);color:#fff;}
.share-btn.wa{background:rgba(37,211,102,0.1);border-color:rgba(37,211,102,0.3);color:#25d366;}
.share-btn.wa:hover{background:#25d366;color:#fff;border-color:#25d366;}
.share-btn.fb{background:rgba(24,119,242,0.1);border-color:rgba(24,119,242,0.3);color:#1877f2;}
.share-btn.fb:hover{background:#1877f2;color:#fff;border-color:#1877f2;}
.share-btn.copy{background:rgba(99,102,241,0.1);border-color:rgba(99,102,241,0.3);color:var(--acc);}
.share-btn.copy:hover{background:var(--acc);color:#fff;}
.share-btn.tw{background:rgba(0,0,0,0.3);border-color:rgba(255,255,255,0.15);color:#fff;}

</style>
</head>
<body>

<nav class="topnav">
  <div class="brand" id="nbrand">Mg Madhuraa Boutique<small id="ntag">Elegance Redefined</small></div>
  <div class="srchwrap">
    <span class="si">🔍</span>
    <input type="search" id="sinput" placeholder="Search products, styles, or IDs..." autocomplete="off">
  </div>
  <button class="fab hide" id="fab">🛍️ Basket <span class="fbadge" id="fcnt">0</span></button>
</nav>

<div class="catbar" id="catbar">
  <button class="cbtn active" data-cat="all">✨ All Collection</button>
</div>

<!-- ═══ FILTER BAR ═══ -->
<div class="filterbar" id="filterbar">
  <button class="fbtn" id="filter-toggle" onclick="C.toggleFilters()">
    🎛️ Filters <span class="fbadge2" id="factive-cnt" style="display:none">0</span>
  </button>
  <div style="width:1px;height:20px;background:var(--bdr);flex-shrink:0;"></div>
  <select class="sort-sel" id="sort-sel" onchange="C.setSort(this.value)">
    <option value="">Sort: Default</option>
    <option value="name-az">Name A → Z</option>
    <option value="name-za">Name Z → A</option>
    <option value="price-asc">Price: Low → High</option>
    <option value="price-desc">Price: High → Low</option>
    <option value="newest">Newest First</option>
  </select>
  <div id="active-chips" style="display:flex;gap:8px;flex-wrap:wrap;flex:1;"></div>
  <button class="fclear" id="clear-all-btn" onclick="C.clearFilters()" style="display:none">✕ Clear All</button>
</div>
<div class="fdrawer" id="fdrawer"></div>

<div class="main">
  <div class="pbar"><div class="pcnt" id="pcnt"></div></div>
  <div class="pgrid" id="pgrid"><div class="state"><div class="spinner"></div><h3>Curating Catalog...</h3></div></div>
</div>

<footer class="ftr">
  <div class="fgrid">
    <div><div class="fbn" id="fbn">Mg Madhuraa Boutique</div><p class="ftg" id="ftg">Elegance Redefined</p></div>
    <div class="fcol">
      <h5>Stay Connected</h5>
      <p id="fph"></p><p id="fwa"></p><p id="fig"></p>
    </div>
    <div class="fcol">
      <h5>Explore</h5>
      <a href="#" onclick="document.getElementById('sinput').focus();return false">Search Collection</a>
      <a href="#" onclick="C.openIQ();return false">Your Basket</a>
    </div>
  </div>
  <div class="fbot">© <span id="fyr"></span> <span id="fcopy">Mg Madhuraa Boutique</span>. All rights reserved ⚡</div>
</footer>

<!-- Inquiry Basket -->
<div class="mover" id="iq-m">
  <div class="modal sm">
    <div class="mhdr"><h3>🛍️ Your Basket</h3><button class="mclose" onclick="C.closeM('iq-m')">✕</button></div>
    <div class="mbody" id="iq-body"></div>
    <div class="mftr">
      <button class="btn btn-s" onclick="C.clearIQ()">Clear</button>
      <button class="btn btn-wa" onclick="C.sendWA()">Send via WhatsApp 💬</button>
    </div>
  </div>
</div>

<!-- Product Detail -->
<div class="mover" id="det-m"></div>
<div class="tc" id="tc"></div>

<script>
(function () {
  'use strict';
  let D = window.__D__ || null;
  let AP = [];
  let _settings = {}; // stores settings after data loads (works for all data sources)

  function e(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
  function pad(n) { return String(n||'').padStart(3, '0'); }
  
  // Create a prominent short ID for easy search visually & WhatsApp
  function code(p) { return p.productNumber ? '#' + pad(p.productNumber) : 'ID: ' + p.id.substring(0, 6).toUpperCase(); }
  function getRawIdForWA(p) { return p.productNumber ? '#' + pad(p.productNumber) : p.id.substring(0,6).toUpperCase(); }

  function minP(p) {
    if (!p.variants||!p.variants.length) return 0;
    let m = Infinity;
    p.variants.forEach(v=>(v.sizes||[]).forEach(s=>{if(+s.sellPrice<m)m=+s.sellPrice;}));
    return m===Infinity?0:m;
  }
  function totS(p) { let t=0; (p.variants||[]).forEach(v=>(v.sizes||[]).forEach(s=>{t+=parseFloat(s.stock)||0;})); return t; }
  function clr(n) {
    const m = {red:'#ef4444',blue:'#3b82f6',green:'#22c55e',yellow:'#eab308',pink:'#ec4899',purple:'#a855f7',orange:'#f97316',white:'#f1f5f9',black:'#111',grey:'#9ca3af',maroon:'#881337',navy:'#1e3a5f'};
    for (const [k, v] of Object.entries(m)) if((n||'').toLowerCase().includes(k)) return v;
    return n||'#6366f1';
  }
  function toast(msg) {
    const tc = document.getElementById('tc'); if(!tc)return;
    const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
    tc.appendChild(t); setTimeout(()=>t.remove(), 3500);
  }

  const C = {
    cat: 'all', q: '', iq: [], _t: null,
    filters: { sizes:[], colors:[], minPrice:'', maxPrice:'', avail:'all' },
    sort: '',
    _fopen: false,

    async init() {
      document.getElementById('fyr').textContent = new Date().getFullYear();
      if (D) { this.setup(D); return; }

      // 0. Check localStorage preview data (set by Admin Panel → Preview Local Shop)
      try {
        const ls = localStorage.getItem('bq_shop_preview');
        if (ls) {
          const lsData = JSON.parse(ls);
          if (lsData && lsData.products && lsData.products.length > 0) {
            this.setup(lsData); return;
          }
        }
      } catch(e) { /* ignore parse errors */ }

      // Safety timeout — never let the spinner freeze forever
      const safetyTimer = setTimeout(() => {
        const g = document.getElementById('pgrid');
        if (g && g.querySelector('.spinner')) {
          g.innerHTML = this._noDataMsg();
        }
      }, 5000);

      try {
        // 1. Try IndexedDB first (works when opened locally)
        try {
          const idbData = await this._loadFromIDB();
          if (idbData && idbData.products && idbData.products.length > 0) {
            clearTimeout(safetyTimer);
            this.setup(idbData); return;
          }
        } catch(e) { /* IDB not available */ }

        // 2. Try fetching products.json (works on GitHub Pages / local server)
        try {
          const r = await fetch('data/products.json?v='+Date.now());
          if (r.ok) {
            const json = await r.json();
            if (json && json.products && json.products.length > 0) {
              clearTimeout(safetyTimer);
              this.setup(json); return;
            }
          }
        } catch(e) { /* fetch failed (file:// protocol) */ }

        // 3. Nothing loaded — show clear message
        clearTimeout(safetyTimer);
        document.getElementById('pgrid').innerHTML = this._noDataMsg();
      } catch(err) {
        clearTimeout(safetyTimer);
        document.getElementById('pgrid').innerHTML = this._noDataMsg();
      }
    },

    // Smart error message: different instruction for GitHub Pages vs local
    _noDataMsg() {
      const isGitHub = location.hostname.includes('github.io') || location.hostname.includes('github.com');
      if (isGitHub) {
        return `<div class="state">
          <h3>⚠️ Products Not Uploaded Yet</h3>
          <p>The catalog data is missing. To fix this:</p>
          <ol style="text-align:left;display:inline-block;margin-top:12px;line-height:2">
            <li>Open <b>index.html</b> in your Admin Panel</li>
            <li>Go to <b>🌐 Online Store</b> → click <b>🚀 Publish Catalog</b></li>
            <li>Save the downloaded <b>products.json</b></li>
            <li>Upload it to your GitHub repo in the <b>data/</b> folder</li>
            <li>Wait ~1 min, then refresh this page</li>
          </ol>
        </div>`;
      }
      return `<div class="state"><h3>⚠️ Shop Not Published Yet</h3><p>Open the <b>Admin Panel</b> (index.html) → <b>🌐 Online Store</b> → click <b>👁️ Preview Local Shop</b>.</p></div>`;
    },

    // Read products + categories + settings directly from the app's IndexedDB
    _loadFromIDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open('BoutiqueManagerV2', 1);
        req.onerror = () => reject(new Error('IDB unavailable'));
        req.onsuccess = (ev) => {
          const db = ev.target.result;
          if (!db.objectStoreNames.contains('products')) {
            db.close(); return reject(new Error('No products store'));
          }
          const storeNames = ['products','categories','settings'].filter(s => db.objectStoreNames.contains(s));
          const tx = db.transaction(storeNames, 'readonly');
          let products = [], categories = [];
          let sVals = {}, sExpected = 0, sDone = 0;
          const sKeys = ['shopName','tagline','phone','whatsappNumber','instagramHandle'];

          const pReq = tx.objectStore('products').getAll();
          const cReq = storeNames.includes('categories') ? tx.objectStore('categories').getAll() : null;

          if (storeNames.includes('settings')) {
            sExpected = sKeys.length;
            sKeys.forEach(k => {
              const gr = tx.objectStore('settings').get(k);
              gr.onsuccess = () => {
                sVals[k] = gr.result ? gr.result.value : '';
                sDone++;
                tryFinish();
              };
            });
          }

          tx.onerror = () => reject(new Error('IDB tx error'));

          let pOk=false, cOk=!cReq;
          pReq.onsuccess = () => { products = pReq.result||[]; pOk=true; tryFinish(); };
          if (cReq) cReq.onsuccess = () => { categories = cReq.result||[]; cOk=true; tryFinish(); };
          else tryFinish();

          function tryFinish() {
            if (!pOk || !cOk || sDone < sExpected) return;
            db.close();
            resolve({
              shopName: sVals.shopName || 'Boutique',
              tagline: sVals.tagline || '',
              settings: {
                phone: sVals.phone||'',
                whatsappNumber: sVals.whatsappNumber||'',
                instagramHandle: sVals.instagramHandle||''
              },
              categories: categories.map(c => ({id:c.id, name:c.name, emoji:c.emoji||'💎'})),
              products: products
                .filter(p => p.status !== 'archived' && p.status !== 'deleted')
                .map(p => ({
                  id: p.id, name: p.name, productNumber: p.productNumber||'',
                  status: 'active', categoryId: p.categoryId||'', categoryName: p.categoryName||'',
                  description: p.description||'',
                  photos: (p.photos||[]).map(ph=>({data:ph.data||'',color:ph.color||''})),
                  variants: (p.variants||[]).map(v=>({
                    color: v.color||'',
                    sizes: (v.sizes||[]).map(s=>({size:s.size||'',sellPrice:+s.sellPrice||0,stock:+s.stock||0}))
                  }))
                }))
            });
          }
        };
      });
    },
    setup(data) {
      AP = (data.products||[]).filter(p=>p.status!=='archived'&&p.status!=='deleted');
      _settings = data.settings || {}; // save for WhatsApp functions
      const sn = data.shopName||'Mg Madhuraa Boutique';
      const tg = data.tagline||'';
      const {phone, whatsappNumber, instagramHandle, themeAccent, themeAccent2, themeBg} = _settings;

      // Apply custom theme colors from admin settings
      const root = document.documentElement;
      if (themeAccent) {
        root.style.setProperty('--acc', themeAccent);
        root.style.setProperty('--glow', themeAccent + '40');
        root.style.setProperty('--bdr2', themeAccent + '50');
      }
      if (themeAccent2) root.style.setProperty('--acc2', themeAccent2);
      if (themeBg && themeBg !== 'dark') {
        const bgs = { midnight:'#0f172a', charcoal:'#1c1c1e', wine:'#1a0008', forest:'#061a06', light:'#f8fafc' };
        const bg2s = { midnight:'#1e293b', charcoal:'#27272a', wine:'#2d0010', forest:'#0a2d0a', light:'#f1f5f9' };
        const cards = { midnight:'#1e293b', charcoal:'#27272a', wine:'#2d0010', forest:'#0a2d0a', light:'#ffffff' };
        const txts = { light:'#0f172a' };
        const txt2s = { light:'#475569' };
        const bg = bgs[themeBg]; const bg2 = bg2s[themeBg]; const card = cards[themeBg];
        if (bg) { root.style.setProperty('--bg', bg); document.body.style.background = bg; }
        if (bg2) root.style.setProperty('--bg2', bg2);
        if (card) root.style.setProperty('--card', card);
        if (txts[themeBg]) root.style.setProperty('--txt', txts[themeBg]);
        if (txt2s[themeBg]) root.style.setProperty('--txt2', txt2s[themeBg]);
      }
      
      document.title = sn + ' | Catalog';
      document.getElementById('nbrand').innerHTML = `${e(sn)}<small>${e(tg)}</small>`;
      document.getElementById('fbn').textContent = sn;
      if (tg) document.getElementById('ftg').textContent = tg;
      if (phone) document.getElementById('fph').innerHTML = '📞 ' + phone;
      if (whatsappNumber) document.getElementById('fwa').innerHTML = '💬 ' + whatsappNumber;
      if (instagramHandle) document.getElementById('fig').innerHTML = '📸 @' + instagramHandle;
      
      this.renderCats(data.categories||[]);
      this.renderGrid();
      this.loadIQ();
      this.bind();
    },
    renderCats(cats) {
      const el = document.getElementById('catbar');
      let h = `<button class="cbtn active" data-cat="all">✨ All Collection</button>`;
      cats.forEach(c => h += `<button class="cbtn" data-cat="${e(c.id)}">${e(c.emoji||'💎')} ${e(c.name)}</button>`);
      el.innerHTML = h;
      el.querySelectorAll('.cbtn').forEach(b => {
        b.onclick = () => {
          el.querySelectorAll('.cbtn').forEach(x=>x.classList.remove('active'));
          b.classList.add('active'); this.cat = b.dataset.cat; this.renderGrid();
        };
      });
    },
    buildFilters() {
      // Collect all unique sizes/colors from live data
      const allSizes = [...new Set(AP.flatMap(p=>(p.variants||[]).flatMap(v=>(v.sizes||[]).map(s=>s.size))).filter(Boolean))].sort();
      const allColors = [...new Set(AP.flatMap(p=>(p.variants||[]).map(v=>v.color)).filter(Boolean))].sort();
      const drawer = document.getElementById('fdrawer');
      drawer.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
          <div style="font-size:0.8rem; font-weight:800; color:var(--txt); text-transform:uppercase; letter-spacing:1px;">Active Filters</div>
          <button onclick="C.clearFilters()" style="background:transparent; border:none; color:var(--acc); font-size:0.75rem; font-weight:700; cursor:pointer; text-decoration:underline;">✕ Clear All</button>
        </div>
        <div class="fgroup">
          <div class="fglabel">📐 Size</div>
          <div class="fchips" id="f-sizes">
            ${allSizes.length ? allSizes.map(s=>`<button class="fopt${this.filters.sizes.includes(s)?' sel':''}" onclick="C.toggleFSize('${e(s)}')">${e(s)}</button>`).join('') : '<span style="color:var(--txt2);font-size:0.82rem;">No size data</span>'}
          </div>
        </div>
        ${allColors.length ? `
        <div class="fdivider"></div>
        <div class="fgroup">
          <div class="fglabel">🎨 Color</div>
          <div class="fchips" id="f-colors">
            ${allColors.map(c=>`<button class="fopt${this.filters.colors.includes(c)?' sel':''}" onclick="C.toggleFColor('${e(c)}')">
              <span class="cdot-f" style="background:${clr(c)}"></span>${e(c)}
            </button>`).join('')}
          </div>
        </div>` : ''}
        <div class="fdivider"></div>
        <div class="fgroup">
          <div class="fglabel">💰 Price Range (₹)</div>
          <div class="pr-row">
            <input class="pr-inp" type="number" id="f-minp" placeholder="Min" value="${this.filters.minPrice}" min="0" onchange="C.filters.minPrice=this.value;C.renderGrid();C.updateFilterUI()">
            <span style="color:var(--txt2);font-weight:700;">—</span>
            <input class="pr-inp" type="number" id="f-maxp" placeholder="Max" value="${this.filters.maxPrice}" min="0" onchange="C.filters.maxPrice=this.value;C.renderGrid();C.updateFilterUI()">
          </div>
        </div>
        <div class="fdivider"></div>
        <div class="fgroup">
          <div class="fglabel">✅ Availability</div>
          <div class="avail-toggle">
            <button class="avbtn${this.filters.avail==='all'?' sel':''}" onclick="C.setAvail('all')">All</button>
            <button class="avbtn${this.filters.avail==='in'?' sel':''}" onclick="C.setAvail('in')">In Stock Only</button>
            <button class="avbtn sel-so${this.filters.avail==='out'?' sel':''}" onclick="C.setAvail('out')">Sold Out Only</button>
          </div>
        </div>`;
    },
    toggleFilters() {
      this._fopen = !this._fopen;
      const d = document.getElementById('fdrawer');
      const btn = document.getElementById('filter-toggle');
      if (this._fopen) { this.buildFilters(); d.classList.add('open'); btn.classList.add('on'); }
      else { d.classList.remove('open'); btn.classList.remove('on'); }
    },
    toggleFSize(sz) {
      const arr = this.filters.sizes;
      const i = arr.indexOf(sz); if(i>=0) arr.splice(i,1); else arr.push(sz);
      if(this._fopen) this.buildFilters(); this.renderGrid(); this.updateFilterUI();
    },
    toggleFColor(clrV) {
      const arr = this.filters.colors;
      const i = arr.indexOf(clrV); if(i>=0) arr.splice(i,1); else arr.push(clrV);
      if(this._fopen) this.buildFilters(); this.renderGrid(); this.updateFilterUI();
    },
    setAvail(v) { this.filters.avail = v; if(this._fopen) this.buildFilters(); this.renderGrid(); this.updateFilterUI(); },
    setSort(v) { this.sort = v; this.renderGrid(); },
    clearFilters() {
      this.filters = { sizes:[], colors:[], minPrice:'', maxPrice:'', avail:'all' };
      this.sort = ''; document.getElementById('sort-sel').value = '';
      if(this._fopen) this.buildFilters();
      this.renderGrid(); this.updateFilterUI();
    },
    countActiveFilters() {
      const f = this.filters;
      return f.sizes.length + f.colors.length + (f.minPrice?1:0) + (f.maxPrice?1:0) + (f.avail!=='all'?1:0) + (this.sort?1:0);
    },
    updateFilterUI() {
      const cnt = this.countActiveFilters();
      const badge = document.getElementById('factive-cnt');
      const clearBtn = document.getElementById('clear-all-btn');
      const chipsEl = document.getElementById('active-chips');
      if (badge) { badge.style.display = cnt ? 'inline-block' : 'none'; badge.textContent = cnt; }
      if (clearBtn) clearBtn.style.display = cnt ? 'inline-block' : 'none';
      if (!chipsEl) return;
      const chips = [];
      this.filters.sizes.forEach(s => chips.push(`<span class="fchip" onclick="C.toggleFSize('${e(s)}')">📐 ${e(s)} <span class="fx">✕</span></span>`));
      this.filters.colors.forEach(c => chips.push(`<span class="fchip" onclick="C.toggleFColor('${e(c)}')" style="gap:6px"><span class="cdot-f" style="background:${clr(c)};width:10px;height:10px;"></span>${e(c)} <span class="fx">✕</span></span>`));
      if (this.filters.minPrice) chips.push(`<span class="fchip" onclick="C.filters.minPrice='';C.renderGrid();C.updateFilterUI()">₹≥${this.filters.minPrice} <span class="fx">✕</span></span>`);
      if (this.filters.maxPrice) chips.push(`<span class="fchip" onclick="C.filters.maxPrice='';C.renderGrid();C.updateFilterUI()">₹≤${this.filters.maxPrice} <span class="fx">✕</span></span>`);
      if (this.filters.avail === 'in') chips.push(`<span class="fchip" onclick="C.setAvail('all')">✅ In Stock <span class="fx">✕</span></span>`);
      if (this.filters.avail === 'out') chips.push(`<span class="fchip" onclick="C.setAvail('all')">❌ Sold Out <span class="fx">✕</span></span>`);
      if (this.sort) chips.push(`<span class="fchip" onclick="C.setSort('');document.getElementById('sort-sel').value=''">↕ ${document.getElementById('sort-sel')?.selectedOptions[0]?.text||'Sort'} <span class="fx">✕</span></span>`);
      chipsEl.innerHTML = chips.join('');
    },
    renderGrid() {
      const grid = document.getElementById('pgrid');
      let fl = [...AP];
      // ── Category filter
      if (this.cat !== 'all') {
        fl = fl.filter(p => String(p.categoryId) === String(this.cat) || (p.categoryName||'').toLowerCase() === this.cat.toLowerCase());
      }
      // ── Text search
      if (this.q) {
        const q = this.q.toLowerCase();
        fl = fl.filter(p => {
          const cd = code(p).toLowerCase();
          return (p.name||'').toLowerCase().includes(q) || (p.description||'').toLowerCase().includes(q) || (p.categoryName||'').toLowerCase().includes(q) || cd.includes(q);
        });
      }
      // ── Size filter
      if (this.filters.sizes.length) {
        fl = fl.filter(p => {
          const pSizes = (p.variants||[]).flatMap(v=>(v.sizes||[]).map(s=>s.size));
          return this.filters.sizes.some(s => pSizes.includes(s));
        });
      }
      // ── Color filter
      if (this.filters.colors.length) {
        fl = fl.filter(p => {
          const pCols = (p.variants||[]).map(v=>v.color).filter(Boolean);
          return this.filters.colors.some(c => pCols.includes(c));
        });
      }
      // ── Price range filter
      const minP2 = this.filters.minPrice ? +this.filters.minPrice : null;
      const maxP2 = this.filters.maxPrice ? +this.filters.maxPrice : null;
      if (minP2 !== null || maxP2 !== null) {
        fl = fl.filter(p => {
          const pr = minP(p);
          if (!pr) return false;
          if (minP2 !== null && pr < minP2) return false;
          if (maxP2 !== null && pr > maxP2) return false;
          return true;
        });
      }
      // ── Availability filter
      if (this.filters.avail === 'in') fl = fl.filter(p => totS(p) > 0);
      if (this.filters.avail === 'out') fl = fl.filter(p => totS(p) === 0);
      // ── Sort
      if (this.sort === 'name-az') fl.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
      else if (this.sort === 'name-za') fl.sort((a,b)=>(b.name||'').localeCompare(a.name||''));
      else if (this.sort === 'price-asc') fl.sort((a,b)=>(minP(a)||0)-(minP(b)||0));
      else if (this.sort === 'price-desc') fl.sort((a,b)=>(minP(b)||0)-(minP(a)||0));
      else if (this.sort === 'newest') fl.sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));

      const activeF = this.countActiveFilters();
      const cntTxt = fl.length
        ? `Showing <span>${fl.length}</span> of <span>${AP.length}</span> styles${activeF ? ` <span style="color:var(--acc);font-size:0.78rem;">(${activeF} filter${activeF>1?'s':''})</span>` : ''}`
        : '';
      document.getElementById('pcnt').innerHTML = cntTxt;
      if (!fl.length) return grid.innerHTML = `<div class="state"><h3>No matches found</h3><p>Try adjusting filters or search term.</p><button onclick="C.clearFilters()" style="margin-top:16px;padding:10px 24px;background:var(--acc);color:#fff;border:none;border-radius:var(--rf);font-weight:800;cursor:pointer;font-family:inherit;font-size:0.9rem;">✕ Clear All Filters</button></div>`;

      grid.innerHTML = fl.map(p => {
        const pcode = code(p);
        const price = minP(p);
        const ph = p.photos?.[0]?.data;
        const img = ph ? `<img src="${ph}" class="pimg" loading="lazy">` : `<div class="pno-img">👗</div>`;
        const cols = (p.variants||[]).map(v=>v.color).filter(Boolean);
        const dots = cols.slice(0,5).map(c=>`<span class="cdot" style="background:${clr(c)}" title="${e(c)}"></span>`).join('');
        const pSizes = [...new Set((p.variants||[]).flatMap(v=>(v.sizes||[]).filter(s=>+s.stock>0).map(s=>s.size)))];
        const szPrev = pSizes.slice(0,4).map(s=>`<span style="font-size:0.65rem;padding:2px 6px;background:rgba(255,255,255,0.06);border:1px solid var(--bdr);border-radius:4px;color:var(--txt2);font-weight:700;">${e(s)}</span>`).join('');
        return `
          <div class="pcard" onclick="C.det('${p.id}')">
            <div class="pimg-box">
              ${img}
              <div class="pcode">${pcode}</div>
              ${totS(p)===0 ? `<div class="sbadge">Sold Out</div>` : ''}
              <div class="povlay"><button class="qvbtn" onclick="event.stopPropagation();C.det('${p.id}')">View Details</button></div>
            </div>
            <div class="pinfo">
              <div class="pcat">${e(p.categoryName||'EXCLUSIVE')}</div>
              <div class="pname">${e(p.name)}</div>
              <div class="cdots">${dots||'<span style="opacity:0">.</span>'}</div>
              <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;min-height:20px;">${szPrev}</div>
              <div class="pftr">
                <div class="pprice">${price ? '₹'+price.toLocaleString('en-IN') : 'Contact'}</div>
              </div>
            </div>
          </div>`;
      }).join('');
    },
    det(id) {
      const p = AP.find(x=>x.id===id); if(!p)return;
      const m = document.getElementById('det-m');
      // Reset state on each open
      m.dataset.pid = id; m.dataset.szs = '[]'; delete m.dataset.sz;

      const pcode = code(p);
      const price = minP(p);
      const isSO = totS(p) === 0; // sold out
      const allSzs = [...new Set((p.variants||[]).flatMap(v=>(v.sizes||[]).map(s=>s.size)))];
      const inStk = [...new Set((p.variants||[]).flatMap(v=>(v.sizes||[]).filter(s=>+s.stock>0).map(s=>s.size)))];
      const szShow = isSO ? allSzs : inStk;
      const cols = (p.variants||[]).map(v=>v.color).filter(Boolean);
      const photos = p.photos||[];

      const gall = photos[0] ? `<img src="${photos[0].data}" id="dimg" class="mimg">` : `<div class="mph">👗</div>`;
      const thumbs = photos.length>1 ? `<div class="thumbrow">${photos.map((ph,i)=>`<img src="${ph.data}" class="thumb${i===0?' active':''}" onclick="C.setImg(this)">`).join('')}</div>` : '';
      const szH = szShow.length
        ? szShow.map(s=>`<span class="sz" onclick="C.selSz(this,'${e(s)}')" style="cursor:pointer">${e(s)}</span>`).join('')
        : `<span class="sz" style="opacity:0.5">${isSO ? 'No size info' : 'Contact for sizes'}</span>`;
      const clH = cols.length ? `<div class="colorlist">${cols.map(c=>`<span class="ctag"><span class="cdotl" style="background:${clr(c)}"></span>${e(c)}</span>`).join('')}</div>` : '';

      const actBtns = isSO
        ? `<div style="background:rgba(244,63,94,0.08);border:1px solid rgba(244,63,94,0.3);border-radius:12px;padding:14px;text-align:center;margin-bottom:12px;">
            <div style="color:var(--err);font-weight:800;font-size:0.9rem;margin-bottom:4px;">❌ Currently Sold Out</div>
            <div style="color:var(--txt2);font-size:0.78rem;">Enquire below — we'll notify you when restocked</div>
           </div>
           <div class="dacts"><button class="btn btn-wa" style="flex:1" onclick="C.soldOutWA('${p.id}')">📩 Enquire on WhatsApp</button></div>`
        : `<div class="dacts">
             <button class="btn btn-p" onclick="C.addIQ('${p.id}')" id="btn-add-${p.id}">🛒 Add to Basket</button>
             <button class="btn btn-wa" onclick="C.directWA('${p.id}')">WhatsApp 💬</button>
           </div>`;

      m.innerHTML = `<div class="modal lg">
        <div class="mhdr">
          <div><div class="mcode">Code: ${pcode}${isSO ? ' &nbsp;<span style="background:var(--err);color:#fff;font-size:0.65rem;padding:2px 8px;border-radius:20px;font-weight:800;vertical-align:middle;">SOLD OUT</span>' : ''}</div></div>
          <button class="mclose" onclick="C.closeM('det-m')">✕</button>
        </div>
        <div class="mbody">
          <div class="dg">
            <div class="dgal">${gall}${thumbs}</div>
            <div class="dinfo">
              <div>
                <div class="dtag">${e(p.categoryName||'EXCLUSIVE')}</div>
                <div class="dname">${e(p.name)}</div>
                <div class="dprice">${price ? '₹'+price.toLocaleString('en-IN') : 'Ask Price'}</div>
              </div>
              ${p.description ? `<p class="ddesc">${e(p.description)}</p>` : ''}
              ${cols.length ? `<div><div class="sec-t">Available Colors</div>${clH}</div>` : ''}
              <div>
                <div class="sec-t" style="display:flex;align-items:center;gap:8px;">
                  ${isSO ? '📦 Sizes (for enquiry)' : '📏 Select Size(s)'}
                  <span id="sz-badge" style="display:none;background:var(--acc);color:#fff;padding:2px 10px;border-radius:20px;font-size:0.68rem;font-weight:800;"></span>
                </div>
                <div class="szrow" id="szrow-${p.id}">${szH}</div>
                ${!isSO && szShow.length ? `<div id="sz-err" style="display:none;color:var(--err);font-size:0.78rem;font-weight:700;margin-top:6px;">⚠️ Please select at least one size</div>
                <div style="color:var(--txt2);font-size:0.72rem;margin-top:4px;">💡 Tap sizes to select — multiple sizes allowed</div>` : ''}
              </div>
              ${p.videoLink ? `<a href="${e(p.videoLink)}" target="_blank" style="display:inline-flex;align-items:center;justify-content:center;gap:6px;margin-bottom:12px;padding:12px 14px;background:rgba(236,72,153,0.1);color:var(--acc2);border:1px solid rgba(236,72,153,0.3);border-radius:12px;text-decoration:none;font-weight:800;font-size:0.9rem;transition:var(--tr);"><span style="font-size:1.1rem;">▶️</span> Watch Product Video / Post</a>` : ''}
              ${actBtns}
              <div class="share-row" style="margin-top:20px;display:flex;gap:8px;flex-wrap:wrap;border-top:1px solid var(--bdr);padding-top:16px;">
                <span style="font-size:0.72rem;color:var(--txt2);font-weight:700;align-self:center;white-space:nowrap;">🔗 Share:</span>
                <button class="share-btn wa" onclick="C.shareWA('${p.id}')" style="font-size:0.7rem;padding:4px 8px;border-radius:4px;border:1px solid var(--bdr);background:transparent;cursor:pointer;">💬 WhatsApp</button>
                <button class="share-btn fb" onclick="C.shareFB('${p.id}')" style="font-size:0.7rem;padding:4px 8px;border-radius:4px;border:1px solid var(--bdr);background:transparent;cursor:pointer;">📱 Facebook</button>
                <button class="share-btn tw" onclick="C.shareTW('${p.id}')" style="font-size:0.7rem;padding:4px 8px;border-radius:4px;border:1px solid var(--bdr);background:transparent;cursor:pointer;">𝕏 X/Twitter</button>
                <button class="share-btn copy" onclick="C.copyLink('${p.id}')" style="font-size:0.7rem;padding:4px 8px;border-radius:4px;border:1px solid var(--bdr);background:transparent;cursor:pointer;">📋 Copy Link</button>
              </div>
            </div>
          </div>
        </div>
      </div>`;
      m.classList.add('open');
    },
    setImg(t) {
      document.getElementById('dimg').src = t.src;
      document.querySelectorAll('.thumb').forEach(x=>x.classList.remove('active'));
      t.classList.add('active');
    },
    // Multi-select size toggle
    selSz(el, sz) {
      el.classList.toggle('active');
      const m = document.getElementById('det-m');
      let szs = JSON.parse(m.dataset.szs || '[]');
      if (szs.includes(sz)) szs = szs.filter(s=>s!==sz); else szs.push(sz);
      m.dataset.szs = JSON.stringify(szs);
      const badge = document.getElementById('sz-badge');
      if (badge) { badge.style.display = szs.length ? 'inline-block' : 'none'; badge.textContent = szs.length + ' selected'; }
      const err = document.getElementById('sz-err');
      if (err && szs.length) err.style.display = 'none';
      const btn = document.getElementById('btn-add-' + m.dataset.pid);
      if (btn) btn.innerHTML = szs.length ? `🛒 Add ${szs.length > 1 ? szs.length + ' Sizes' : 'Size: ' + szs[0]} to Basket` : '🛒 Add to Basket';
    },
    closeM(id) {
      const el=document.getElementById(id); if(el) el.classList.remove('open');
      if(id==='det-m') history.replaceState(null,'',location.href.split('#')[0]);
    },

    loadIQ() { try { const s=localStorage.getItem('bq_bask'); if(s)this.iq=JSON.parse(s); }catch(e){} this.uFAB(); },
    svIQ() { try { localStorage.setItem('bq_bask',JSON.stringify(this.iq)); }catch(e){} this.uFAB(); },
    addIQ(id) {
      const p = AP.find(x=>x.id===id); if(!p) return;
      const m = document.getElementById('det-m');
      const szs = JSON.parse(m.dataset.szs || '[]');
      const availSzs = [...new Set((p.variants||[]).flatMap(v=>(v.sizes||[]).filter(s=>+s.stock>0).map(s=>s.size)))];
      if (availSzs.length > 0 && szs.length === 0) {
        const err = document.getElementById('sz-err');
        if (err) err.style.display = 'block';
        const row = document.querySelector('#det-m .szrow');
        if (row) { row.style.outline='2px solid var(--err)'; row.style.borderRadius='8px'; setTimeout(()=>row.style.outline='',1800); }
        toast('👆 Select at least one size first!'); return;
      }
      const key = p.id + (szs.length ? '|' + [...szs].sort().join(',') : '');
      if (!this.iq.some(x=>x.id===key)) {
        this.iq.push({ id:key, pid:p.id, name:p.name, sizes:szs, code:getRawIdForWA(p), price:minP(p), photo:p.photos?.[0]?.data });
        this.svIQ();
        const szLabel = szs.length ? ` — ${szs.length>1?'Sizes':'Size'}: ${szs.join(', ')}` : '';
        toast('✅ Added to Basket' + szLabel);
        m.dataset.szs = '[]'; this.closeM('det-m');
      } else toast('⚠️ Same size combination already in basket!');
    },
    rmIQ(id) { this.iq=this.iq.filter(x=>x.id!==id); this.svIQ(); this.renderIQ(); },
    clearIQ() { this.iq=[]; this.svIQ(); this.closeM('iq-m'); },
    uFAB() {
      const f=document.getElementById('fab'), c=document.getElementById('fcnt');
      if(this.iq.length) { f.classList.remove('hide'); c.textContent=this.iq.length; } else f.classList.add('hide');
    },
    renderIQ() {
      const el = document.getElementById('iq-body');
      if(!this.iq.length) return el.innerHTML = `<div class="state"><h3>🛒 Basket Empty</h3><p>Browse our collection and add items.</p></div>`;
      el.innerHTML = this.iq.map(i => {
        const sizes = i.sizes && i.sizes.length ? i.sizes : (i.size ? [i.size] : []);
        const szPills = sizes.map(s=>`<span style="background:var(--acc);color:#fff;padding:2px 9px;border-radius:20px;font-size:0.7rem;font-weight:800;">${e(s)}</span>`).join(' ');
        return `<div class="iqi">
          ${i.photo ? `<img src="${i.photo}" class="iqth">` : `<div class="iqth" style="background:#111;display:flex;align-items:center;justify-content:center;font-size:1.5rem;">👗</div>`}
          <div class="iqinfo">
            <div class="iqname">${e(i.name)}</div>
            <div class="iqcode" style="margin-bottom:5px;">ID: <b>${e(i.code)}</b></div>
            ${szPills ? `<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px;">${szPills}</div>` : ''}
            <div style="font-weight:800;color:var(--acc);font-size:0.95rem;">${i.price ? '₹'+i.price.toLocaleString('en-IN') : 'Contact for price'}</div>
          </div>
          <button class="iqrm" onclick="C.rmIQ('${i.id}')">✕</button>
        </div>`;
      }).join('');
    },
    openIQ() { this.renderIQ(); document.getElementById('iq-m').classList.add('open'); },
    _waPhone() {
      const wa = _settings.whatsappNumber || (D&&D.settings&&D.settings.whatsappNumber) || '';
      return wa.replace(/\D/g,'');
    },
    _shopName() { return document.getElementById('fbn')?.textContent?.trim() || 'Boutique'; },
    _div() { return '\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501'; },
    sendWA() {
      if(!this.iq.length) return;
      const ph = this._waPhone();
      const sn = this._shopName();
      let msg = '\uD83D\uDECD\uFE0F *' + sn + ' \u2014 Order Inquiry*\n\nHello! I would like to inquire about:\n' + this._div() + '\n\n';
      this.iq.forEach((i, idx) => {
        const sizes = i.sizes && i.sizes.length ? i.sizes : (i.size ? [i.size] : []);
        msg += (idx+1) + '. *' + i.name + '*\n';
        msg += '   \uD83C\uDFF7\uFE0F Code: *' + i.code + '*\n';
        if (sizes.length) msg += '   \uD83D\uDCCF Size' + (sizes.length>1?'s':'') + ': *' + sizes.join(', ') + '*\n';
        if (i.price) msg += '   \uD83D\uDCB0 \u20B9' + i.price.toLocaleString('en-IN') + '\n';
        msg += '\n';
      });
      msg += this._div() + '\n\uD83D\uDCE6 Total: *' + this.iq.length + ' item' + (this.iq.length>1?'s':'') + '*\n_Please confirm availability & pricing._\n_Thank you! \uD83D\uDE4F_';
      window.open((ph ? 'https://wa.me/'+ph : 'https://wa.me/') + '?text=' + encodeURIComponent(msg), '_blank');
    },
    directWA(id) {
      const p = AP.find(x=>x.id===id); if(!p) return;
      const ph = this._waPhone();
      const m = document.getElementById('det-m');
      const szs = JSON.parse(m?.dataset.szs || '[]');
      // Fix: WhatsApp Enquiry without size should be allowed if user prefers!
      // I am removing the block that forces a size.
      const sn = this._shopName();
      let msg = '\uD83D\uDECD\uFE0F *' + sn + ' \u2014 Product Inquiry*\n\nHello! I\'m interested in:\n' + this._div() + '\n\n';
      msg += '\uD83D\uDCE6 *' + p.name + '*\n\uD83C\uDFF7\uFE0F Code: *' + getRawIdForWA(p) + '*\n';
      if (szs.length) msg += '\uD83D\uDCCF Size' + (szs.length>1?'s':'') + ': *' + szs.join(', ') + '*\n';
      if (minP(p)) msg += '\uD83D\uDCB0 Price: \u20B9' + minP(p).toLocaleString('en-IN') + '\n';
      msg += '\n' + this._div() + '\n_Please confirm availability & pricing._\n_Thank you! \uD83D\uDE4F_';
      window.open((ph ? 'https://wa.me/'+ph : 'https://wa.me/') + '?text=' + encodeURIComponent(msg), '_blank');
    },
    soldOutWA(id) {
      const p = AP.find(x=>x.id===id); if(!p) return;
      const ph = this._waPhone();
      const m = document.getElementById('det-m');
      const szs = JSON.parse(m?.dataset.szs || '[]');
      const sn = this._shopName();
      let msg = '\uD83D\uDECD\uFE0F *' + sn + ' \u2014 Sold Out Inquiry*\n\nHello! I\'m interested in a sold-out item:\n' + this._div() + '\n\n';
      msg += '\uD83D\uDCE6 *' + p.name + '*\n\uD83C\uDFF7\uFE0F Code: *' + getRawIdForWA(p) + '*\n';
      if (szs.length) msg += '\uD83D\uDCCF Interested Size' + (szs.length>1?'s':'') + ': *' + szs.join(', ') + '*\n';
      msg += '\n' + this._div() + '\n\u2753 *When will this be restocked?*\n_If you have a similar style, please let me know too!_\n_Thank you! \uD83D\uDE4F_';
      window.open((ph ? 'https://wa.me/'+ph : 'https://wa.me/') + '?text=' + encodeURIComponent(msg), '_blank');
    },
    // ━━━ SOCIAL SHARE ━━━
    _productURL(id) {
      const p = AP.find(x=>x.id===id);
      const base = location.href.split('#')[0];
      return base + '#' + encodeURIComponent(id);
    },
    shareWA(id) {
      const p = AP.find(x=>x.id===id); if(!p) return;
      const ph = this._waPhone();
      const sn = this._shopName();
      const url = this._productURL(id);
      let msg = '\uD83D\uDECD\uFE0F *' + sn + '* \u2014 Check out this product!\n\n';
      msg += '\uD83D\uDCE6 *' + p.name + '*\n';
      msg += '\uD83C\uDFF7\uFE0F Code: *' + getRawIdForWA(p) + '*\n';
      if (minP(p)) msg += '\uD83D\uDCB0 Price: \u20B9' + minP(p).toLocaleString('en-IN') + '\n';
      msg += '\n\uD83D\uDD17 View: ' + url;
      window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
    },
    shareFB(id) {
      const url = this._productURL(id);
      window.open('https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(url), '_blank');
    },
    shareTW(id) {
      const p = AP.find(x=>x.id===id); if(!p) return;
      const sn = this._shopName();
      const url = this._productURL(id);
      const txt = 'Check out ' + p.name + ' at ' + sn + '!';
      window.open('https://twitter.com/intent/tweet?text=' + encodeURIComponent(txt) + '&url=' + encodeURIComponent(url), '_blank');
    },
    copyLink(id) {
      const url = this._productURL(id);
      navigator.clipboard?.writeText(url).then(() => toast('\u2705 Product link copied!')).catch(() => {
        const ta = document.createElement('textarea'); ta.value = url;
        document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
        toast('\u2705 Link copied!');
      });
    },
    bind() {
      document.getElementById('sinput').oninput = ev => { clearTimeout(this._t); this._t=setTimeout(()=>{this.q=ev.target.value.trim();this.renderGrid();},200); };
      document.getElementById('fab').onclick = () => this.openIQ();
      ['iq-m','det-m'].forEach(id=>{ document.getElementById(id).onclick = ev => { if(ev.target.id===id) this.closeM(id); }});
      document.addEventListener('keydown', ev => {
        if(ev.key==='Escape'){
          this.closeM('det-m');
          history.replaceState(null,'',location.href.split('#')[0]);
          this.closeM('iq-m');
        }
      });
      // Hash-based deep linking: auto-open product from URL
      const hash = decodeURIComponent(location.hash.slice(1));
      if (hash) {
        const p = AP.find(x=>x.id===hash);
        if (p) setTimeout(()=>this.det(hash), 300);
      }
    }
  };
  document.addEventListener('DOMContentLoaded', ()=>C.init());
  window.C = C;
})();
</script>
</body>
</html>
