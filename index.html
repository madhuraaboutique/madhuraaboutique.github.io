<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Elite Boutique | Signature Selection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --accent: #db2777; /* Deep Luxury Pink */
  --accent-light: #fbcfe8;
  --accent-glow: rgba(219, 39, 119, 0.3);
  --bg-start: #0a0e1a;
  --bg-end: #0f172a;
  --card: #161e2e;
  --text: #f8fafc;
  --text-mute: #94a3b8;
  --border: rgba(255, 255, 255, 0.08);
  --radius: 16px;
  --btn-radius: 50px;
  --sh: 0 20px 40px rgba(0,0,0,0.4);
  --sh-pop: 0 30px 60px rgba(0,0,0,0.6);
  --tr: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  --h-font: 'Outfit', sans-serif;
  --grid-cols: 4;
  --logo-size: 50px;
  --nav-padding: 16px 40px;
  --hero-height: 600px;
  --grid-gap: 35px;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  font-family: var(--h-font); 
  background: var(--bg-start);
  background: radial-gradient(circle at top right, #1e1b4b, var(--bg-start));
  background-attachment: fixed;
  color: var(--text); 
  line-height: 1.6; 
  overflow-x: hidden; 
  -webkit-font-smoothing: antialiased;
}

/* Announcement Bar */
.ann-bar { 
  background: var(--accent); 
  color: #ffffff !important; 
  padding: 12px; 
  text-align: center; 
  font-size: 0.8rem; 
  font-weight: 900; 
  letter-spacing: 2px; 
  text-transform: uppercase; 
  border-bottom: 1px solid rgba(255,255,255,0.1); 
  text-shadow: 0 2px 4px rgba(0,0,0,0.5);
}

/* Navbar */
.nav { position: sticky; top: 0; z-index: 1000; padding: var(--nav-padding); background: rgba(10, 14, 26, 0.7); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 30px; transition: var(--tr); }
.logo-box { display: flex; align-items: center; gap: 15px; }
.logo-img { max-height: var(--logo-size); object-fit: contain; }
.logo-box span { font-size: 1.4rem; font-weight: 900; color: #fff; letter-spacing: -1px; text-transform: uppercase; background: linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

.search-wrap { flex: 1; max-width: 400px; position: relative; }
.search-wrap input { width: 100%; height: 44px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 50px; padding: 0 15px 0 45px; color: var(--text); outline: none; transition: var(--tr); font-size: 0.9rem; box-shadow: var(--sh); }
.search-wrap input:focus { border-color: var(--accent); background: rgba(255,255,255,0.1); box-shadow: 0 0 20px var(--accent-glow), var(--sh-pop); }
.search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); opacity: 0.6; font-size: 0.9rem; }

.cart-btn { 
  background: #fff; 
  color: #000 !important; 
  padding: 10px 24px; 
  border-radius: 50px; 
  font-weight: 800; 
  cursor: pointer; 
  transition: var(--tr); 
  border: none; 
  font-size: 0.9rem; 
  box-shadow: 0 8px 20px rgba(0,0,0,0.3); 
  display: flex;
  align-items: center;
  gap: 8px;
}
.cart-btn:hover { 
  transform: translateY(-2px); 
  box-shadow: 0 12px 30px rgba(0,0,0,0.4); 
  background: var(--accent); 
  color: #fff !important; 
}
.nav-actions { display: flex; align-items: center; gap: 40px; }
.nav-contact { 
  color: var(--accent); 
  text-decoration: none; 
  font-size: 0.9rem; 
  font-weight: 800; 
  letter-spacing: 0.5px; 
  transition: var(--tr); 
  white-space: nowrap; 
}
.nav-contact:hover { 
  opacity: 1; 
  filter: brightness(1.2); 
  transform: translateY(-1px); 
}

/* Hero Slider */
.hero { height: var(--hero-height); overflow: hidden; position: relative; background: #000; box-shadow: var(--sh-pop); }
.slider { display: flex; height: 100%; transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
.slide { position: relative; flex: 0 0 100%; height: 100%; }
.slide img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; transition: transform 8s linear; }
.slide:hover img { transform: scale(1.1); }
.slide-cnt {
  position: absolute; bottom: 0; left: 0; width: 100%; padding: 80px;
  background: linear-gradient(to top, rgba(10,14,26,0.9), transparent);
  display: flex; flex-direction: column; justify-content: flex-end;
  align-items: var(--hero-align, flex-start);
  text-align: var(--hero-text-align, left);
}
.slide-h { font-size: 4.5rem; font-weight: 950; margin-bottom: 20px; letter-spacing: -3px; line-height: 0.9; text-transform: uppercase; }
.slide-btn { background: #fff; color: #000; padding: 18px 48px; border-radius: var(--btn-radius); font-weight: 900; cursor: pointer; border: none; transition: var(--tr); text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem; box-shadow: var(--sh); }
.slide-btn:hover { background: var(--accent); color: #fff; transform: scale(1.05); box-shadow: var(--sh-pop); }

/* Sidebar & Layout Control */
.shop-wrap { 
  display: flex; 
  max-width: var(--shop-max-width, 1600px); 
  margin: 0 auto; 
  gap: var(--shop-gap, 60px); 
  padding: 0 40px; 
}
.sidebar { 
  width: var(--sidebar-width, 320px); 
  padding: 40px 0; position: sticky; top: 100px; 
  height: calc(100vh - 100px); overflow-y: auto; 
  scrollbar-width: none; -ms-overflow-style: none;
  z-index: 50;
}
.sidebar::-webkit-scrollbar { display: none; }

.side-sec { margin-bottom: 30px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px; }
.side-sec:first-child { border: none; padding-top: 0; }

.side-h { 
  font-size: 0.75rem; 
  text-transform: uppercase; 
  letter-spacing: 5px; color: var(--text); 
  margin-bottom: 15px; font-weight: 800;
  display: flex; align-items: center;
  gap: 15px;
}
.side-h::before {
  content: ''; width: 3px; height: 18px; background: var(--accent); border-radius: 2px;
}

.cat-list { display: flex; flex-direction: column; gap: 0; }
.cat-item-wrap { border-bottom: 1px solid rgba(255,255,255,0.03); }
.cat-item-wrap:last-child { border: none; }

.cat-btn { 
  display: flex; align-items: center; gap: 18px;
  padding: 18px 20px; cursor: pointer; transition: var(--tr); 
  color: var(--text-mute); font-weight: 600; 
  text-align: left; border: none; background: transparent; 
  width: 100%; font-size: 0.95rem; 
  position: relative; border-radius: 12px;
  white-space: nowrap;
}
.cat-btn:hover { color: #fff; background: rgba(255,255,255,0.03); }
.cat-btn.active { 
  color: #fff; font-weight: 700; 
  background: linear-gradient(90deg, rgba(219, 39, 119, 0.1), transparent);
  box-shadow: inset 2px 0 0 var(--accent);
}
.cat-icon { width: 24px; height: 24px; opacity: 0.6; transition: var(--tr); flex-shrink: 0; }
.cat-btn:hover .cat-icon, .cat-btn.active .cat-icon { opacity: 1; color: var(--accent); }
.cat-chevron { margin-left: auto; font-size: 0.8rem; opacity: 0.3; }

/* Mobile Category Strip */
.mobile-cats { display: none; padding: 10px 0; margin-bottom: 20px; border-bottom: 1px solid var(--border); overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.mobile-cats::-webkit-scrollbar { display: none; }
.mobile-cats .cat-list { flex-direction: row; gap: 10px; width: max-content; }
.mobile-cats .cat-btn { padding: 10px 20px; border: 1px solid var(--border); width: auto; font-size: 0.8rem; }
.mobile-cats .cat-chevron, .mobile-cats .cat-icon { display: none; }
.mobile-cats .cat-btn.active { box-shadow: 0 0 15px var(--accent-glow); }

.filter-trigger { display: none; width: 100%; padding: 15px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; color: #fff; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; font-size: 0.75rem; margin-bottom: 20px; align-items: center; justify-content: center; gap: 10px; cursor: pointer; }

.f-compact { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.03); padding: 12px 15px; border-radius: 12px; border: 1px solid var(--border); transition: var(--tr); }
.f-compact:focus-within { border-color: var(--accent); background: rgba(255,255,255,0.06); box-shadow: 0 0 15px var(--accent-glow); }
.f-input-wrap { flex: 1; display: flex; flex-direction: column; gap: 2px; }
.f-input-label { font-size: 0.55rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-mute); font-weight: 800; }
.f-input-row { display: flex; align-items: center; gap: 4px; font-size: 0.85rem; font-weight: 700; color: #fff; }
.f-input-row input { background: transparent; border: none; color: #fff; width: 100%; outline: none; font-size: 0.85rem; font-weight: 800; padding: 0; }
.f-dash { opacity: 0.2; font-size: 1.2rem; font-weight: 200; margin-top: 10px; }

.sz-list, .clr-list { display: flex; flex-wrap: wrap; gap: 10px; }
.sz-pill, .clr-pill { 
  min-width: 60px; height: 45px; display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--border); border-radius: 8px; 
  font-weight: 700; font-size: 0.8rem; cursor: pointer; transition: var(--tr); 
  background: transparent; color: var(--text-mute); 
}
.sz-pill:hover, .clr-pill:hover { border-color: var(--accent); color: var(--accent); }
.sz-pill.active, .clr-pill.active { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 10px 20px var(--accent-glow); }

.btn-clear {
  width: 100%; padding: 15px; background: rgba(239, 68, 68, 0.1); color: #ef4444;
  border: 1px solid rgba(239, 68, 68, 0.2); border-radius: 12px; font-weight: 800;
  cursor: pointer; transition: var(--tr); font-size: 0.8rem; text-transform: uppercase;
  letter-spacing: 2px; margin-top: 10px;
}
.btn-clear:hover { background: #ef4444; color: #fff; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(239, 68, 68, 0.3); }

/* Pagination */
.pagination { display: flex; justify-content: center; align-items: center; gap: 12px; margin-top: 60px; padding: 20px; flex-wrap: wrap; }
.pg-btn { 
  padding: 12px 18px; border-radius: 10px; border: 1px solid var(--border); 
  cursor: pointer; transition: var(--tr); background: rgba(255,255,255,0.03); 
  font-weight: 800; color: var(--text-mute); font-size: 0.85rem;
}
.pg-btn:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-3px); }
.pg-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 10px 20px var(--accent-glow); }
.pg-info { font-size: 0.75rem; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; opacity: 0.4; margin: 0 20px; }

/* Grid */
.main { flex: 1; padding: 60px 0; }
.grid { display: grid; grid-template-columns: repeat(var(--grid-cols), 1fr); gap: var(--grid-gap); }
.card { background: rgba(255,255,255,0.02); border-radius: var(--radius); overflow: hidden; transition: var(--tr); cursor: pointer; position: relative; border: 1px solid var(--border); box-shadow: var(--sh); }
.card:hover { transform: translateY(-10px); border-color: var(--accent); box-shadow: var(--sh-pop); background: rgba(255,255,255,0.04); }
.card-img { aspect-ratio: 3/4; overflow: hidden; border-radius: var(--radius); position: relative; background: var(--card); }
.card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
.card:hover .card-img img { transform: scale(1.1); }
.card-img::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, rgba(10,14,26,0.4), transparent); opacity: 0; transition: var(--tr); }
.card:hover .card-img::after { opacity: 1; }

.card-info { padding: 20px 15px; }
.card-id { font-size: 0.65rem; font-weight: 950; color: var(--accent); letter-spacing: 1px; margin-bottom: 4px; text-transform: uppercase; }
.card-name { font-weight: 700; font-size: 1.05rem; margin-bottom: 8px; line-height: 1.2; color: #fff; }
.card-price { font-weight: 900; color: var(--accent); font-size: 1.25rem; letter-spacing: -0.5px; }

/* Testimonials */
.testi-sec { padding: 120px 40px; background: radial-gradient(circle at center, #1e1b4b 0%, var(--bg-start) 100%); border-top: 1px solid var(--border); text-align: center; }
.testi-h { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 6px; color: var(--accent); margin-bottom: 60px; font-weight: 950; }
.testi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 40px; max-width: 1400px; margin: 0 auto; }
.testi-card { background: rgba(255,255,255,0.03); padding: 50px 40px; border-radius: 24px; border: 1px solid var(--border); position: relative; transition: var(--tr); backdrop-filter: blur(10px); box-shadow: var(--sh); }
.testi-card:hover { border-color: var(--accent); transform: translateY(-8px); background: rgba(255,255,255,0.05); box-shadow: var(--sh-pop); }
.testi-stars { color: var(--accent); font-size: 1rem; margin-bottom: 20px; }
.testi-txt { font-size: 1.1rem; font-style: italic; opacity: 0.9; margin-bottom: 30px; line-height: 1.8; color: #e2e8f0; }
.testi-user { font-weight: 900; font-size: 0.9rem; letter-spacing: 2px; color: #fff; text-transform: uppercase; }

/* Modal Deluxe */
.modal-over { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); z-index: 2000; display: none; align-items: center; justify-content: center; opacity: 0; transition: var(--tr); padding: 20px; }
.modal-over.open { display: flex; opacity: 1; }
.modal { background: var(--card); border-radius: 32px; border: 1px solid var(--border); width: 95%; max-width: 1100px; display: flex; overflow: hidden; box-shadow: var(--sh-pop); max-height: 90vh; position: relative; animation: modalIn 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
@keyframes modalIn { from { opacity: 0; transform: translateY(30px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }

.m-gallery { flex: 1.2; background: #000; padding: 30px; display: flex; gap: 20px; border-right: 1px solid var(--border); }
.m-thumbs { display: flex; flex-direction: column; gap: 12px; width: 100px; overflow-y: auto; overflow-x: hidden; padding-right: 5px; }
.m-thumbs::-webkit-scrollbar { width: 4px; }
.m-thumbs::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
.m-thumb { width: 100%; height: 110px; border-radius: 12px; object-fit: cover; cursor: pointer; opacity: 0.5; transition: var(--tr); border: 2px solid transparent; box-shadow: var(--sh); }
.m-thumb:hover { opacity: 0.8; transform: scale(1.05); }
.m-thumb.active { opacity: 1; border-color: var(--accent); transform: scale(1.1); box-shadow: var(--sh-pop); }
.m-img-main-wrap { flex: 1; display: flex; align-items: center; justify-content: center; background: var(--card); border-radius: 20px; overflow: hidden; position: relative; box-shadow: inset 0 0 50px rgba(0,0,0,0.5); }
.m-img-main { max-width: 100%; max-height: 100%; object-fit: contain; }

.m-info { flex: 1; padding: 50px; overflow-y: auto; overflow-x: hidden; display: flex; flex-direction: column; gap: 30px; }
.m-id { font-size: 0.8rem; font-weight: 950; color: var(--accent); letter-spacing: 3px; margin-bottom: -20px; text-transform: uppercase; }
.m-name { font-size: 2.8rem; font-weight: 950; line-height: 1; letter-spacing: -2px; }
.m-price-box { background: rgba(219, 39, 119, 0.05); padding: 24px; border-radius: 20px; border: 1px solid var(--accent-glow); box-shadow: var(--sh); }
.m-price { font-size: 40px; font-weight: 950; color: var(--accent); }
.m-old-price { font-size: 1.4rem; opacity: 0.4; font-weight: 800; text-decoration: line-through; }
.m-disc-tag { background: var(--accent); color: #fff; padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; font-weight: 900; margin-bottom: 8px; display: inline-block; }

.m-sz-sec h4 { font-size: 0.8rem; font-weight: 950; color: var(--accent); letter-spacing: 3px; margin-bottom: 15px; }
.m-sizes { display: flex; flex-wrap: wrap; gap: 10px; }
.m-sz-btn { padding: 14px; border: 1.5px solid var(--border); background: rgba(255,255,255,0.03); color: var(--text); border-radius: 12px; font-weight: 800; cursor: pointer; transition: var(--tr); flex: 1; min-width: 65px; text-align: center; font-size: 0.9rem; box-shadow: var(--sh); }
.m-sz-btn:hover { border-color: #fff; background: rgba(255,255,255,0.08); transform: translateY(-3px); box-shadow: var(--sh-pop); }
.m-sz-btn.active { background: #fff; color: #000; border-color: #fff; font-weight: 900; }

.m-actions { display: grid; gap: 15px; }
.btn-cart { background: #fff; color: #000; padding: 20px; border-radius: var(--btn-radius); font-weight: 950; border: none; cursor: pointer; transition: var(--tr); font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; box-shadow: var(--sh); }
.btn-cart:hover { background: var(--accent); color: #fff; transform: translateY(-3px); box-shadow: 0 10px 20px var(--accent-glow), var(--sh-pop); }
.btn-wa { background: #25d366; color: #fff; padding: 20px; border-radius: var(--btn-radius); font-weight: 950; border: none; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; font-size: 1rem; text-align: center; box-shadow: var(--sh); }
.btn-wa:hover { filter: brightness(1.1); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(37,211,102,0.3), var(--sh-pop); }

.btn-video { 
  background: linear-gradient(90deg, rgba(255,255,255,0.05), rgba(255,255,255,0.1), rgba(255,255,255,0.05));
  background-size: 200% 100%;
  color: #fff; padding: 18px; border-radius: var(--btn-radius); 
  font-weight: 800; border: 1px solid var(--accent); 
  cursor: pointer; transition: var(--tr); 
  font-size: 0.85rem; text-transform: uppercase; 
  letter-spacing: 2px; text-align: center; margin-bottom: 10px;
  animation: videoPulse 3s infinite linear, shimmer 4s infinite linear;
  box-shadow: 0 0 10px var(--accent-glow);
}
.btn-video:hover { background: rgba(255,255,255,0.15); transform: translateY(-2px); box-shadow: 0 5px 20px var(--accent-glow); }

@keyframes videoPulse {
  0% { box-shadow: 0 0 0 0 rgba(219, 39, 119, 0.4); }
  70% { box-shadow: 0 0 0 15px rgba(219, 39, 119, 0); }
  100% { box-shadow: 0 0 0 0 rgba(219, 39, 119, 0); }
}
@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

.m-feat-item { opacity: 0.8; font-size: 0.85rem; margin-top: 5px; display: flex; gap: 12px; align-items: flex-start; font-weight: 600; line-height: 1.4; }
.m-feat-text { word-break: break-word; overflow-wrap: anywhere; flex: 1; }

.m-close { 
  position: absolute; top: 30px; right: 30px; 
  background: rgba(255,255,255,0.1); border: none; color: #fff; 
  width: 44px; height: 44px; border-radius: 50%; 
  cursor: pointer; z-index: 1000; font-size: 1.2rem; font-weight: 900; 
  display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); transition: var(--tr); box-shadow: var(--sh);
}
.m-close:hover { background: var(--accent); transform: rotate(90deg); box-shadow: var(--sh-pop); }

/* Slide-out Sidebar Cart */
.basket-over { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(15px); z-index: 3000; display: none; justify-content: flex-end; opacity: 0; transition: var(--tr); }
.basket-over.open { display: flex; opacity: 1; }
.basket { 
  background: var(--bg-end); width: 450px; height: 100%; border-left: 1px solid var(--border); 
  padding: 50px; box-shadow: -30px 0 80px rgba(0,0,0,0.5);
  transform: translateX(100%); transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  display: flex; flex-direction: column;
}
.basket-over.open .basket { transform: translateX(0); }

.b-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 45px; }
.b-header h2 { font-size: 2rem; font-weight: 950; letter-spacing: -1.5px; }
.b-close { font-size: 2rem; cursor: pointer; opacity: 0.5; transition: var(--tr); }
.b-close:hover { opacity: 1; color: var(--accent); transform: rotate(90deg); }

.b-list { flex: 1; overflow-y: auto; padding-right: 15px; }
.b-item { display: flex; justify-content: space-between; align-items: center; padding: 25px 0; border-bottom: 1px solid var(--border); gap: 15px; }
.b-item-info { flex: 1; }
.b-item-info b { font-size: 1.1rem; font-weight: 800; display: block; margin-bottom: 5px; color: #fff; }
.b-item-info span { font-size: 0.8rem; font-weight: 900; background: rgba(255,255,255,0.06); padding: 4px 10px; border-radius: 6px; color: var(--accent); box-shadow: var(--sh); }

.b-qty-ctrl { display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.05); padding: 8px; border-radius: 12px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.2); }
.b-qty-btn { 
  width: 30px; height: 30px; border-radius: 8px; border: none; cursor: pointer; 
  background: rgba(255,255,255,0.1); color: var(--text); font-weight: 900; font-size: 1.1rem; 
  display: flex; align-items: center; justify-content: center; transition: var(--tr); box-shadow: var(--sh);
}
.b-qty-btn:hover { background: var(--accent); color: #fff; transform: scale(1.1); box-shadow: var(--sh-pop); }
.b-qty { font-weight: 900; font-size: 1rem; min-width: 25px; text-align: center; }

.b-footer { padding-top: 35px; border-top: 1px solid var(--border); margin-top: 20px; }
.b-total { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; font-size: 1.4rem; font-weight: 950; }

.toast { position: fixed; bottom: 40px; right: 40px; transform: translateY(150px); background: #fff; color: #000; padding: 16px 32px; border-radius: 16px; font-weight: 900; z-index: 5000; transition: transform 0.6s cubic-bezier(0.18, 0.89, 0.32, 1.28); box-shadow: 0 30px 60px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 12px; font-size: 1rem; border-left: 6px solid var(--accent); }
.toast.show { transform: translateY(0); }

.ann-bar { background: var(--accent); color: #fff; text-align: center; padding: 10px; font-weight: 900; font-size: 0.8rem; letter-spacing: 4px; text-transform: uppercase; box-shadow: var(--sh); }

/* Values Section */
.values-sec { padding: 100px 40px; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 40px; max-width: 1400px; margin: 0 auto; text-align: center; }
.val-card { display: flex; flex-direction: column; align-items: center; gap: 15px; padding: 30px; border-radius: 24px; transition: var(--tr); }
.val-card:hover { transform: translateY(-10px); background: rgba(255,255,255,0.02); box-shadow: var(--sh); }
.val-icon { font-size: 2.5rem; margin-bottom: 10px; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.3)); }
.val-h { font-weight: 900; font-size: 1.2rem; letter-spacing: -0.5px; }
.val-p { opacity: 0.6; font-size: 0.9rem; max-width: 220px; }

/* Elite Footer */
.shop-footer { background: var(--bg-card); border-top: 1px solid var(--border); padding: 100px 40px 40px; margin-top: 100px; }
.footer-grid { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 80px; }
.footer-h { font-size: 1.1rem; font-weight: 950; letter-spacing: 2px; color: var(--accent); margin-bottom: 25px; text-transform: uppercase; }

.footer-links, .footer-contact { display: flex; flex-direction: column; gap: 15px; }
.footer-links a, .footer-contact a { color: var(--text); opacity: 0.7; text-decoration: none; transition: var(--tr); font-size: 0.9rem; font-weight: 600; }
.footer-links a:hover, .footer-contact a:hover { opacity: 1; color: var(--accent); transform: translateX(5px); }
.footer-contact div { opacity: 0.8; font-size: 0.9rem; font-weight: 600; display: flex; align-items: center; gap: 10px; }
.footer-bottom { text-align: center; margin-top: 100px; padding-top: 40px; border-top: 1px solid var(--border); opacity: 0.4; font-size: 0.75rem; font-weight: 800; letter-spacing: 3px; }

/* Absolute Gloss Glass Bubbles */
#bubble-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; overflow: hidden; }
.bubble {
  position: absolute; bottom: -120px;
  background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0.1) 40%, rgba(255,255,255,0) 70%);
  border: 1.5px solid rgba(255,255,255,0.5);
  border-radius: 50%;
  backdrop-filter: blur(1.5px);
  box-shadow: 
    inset 0 10px 15px rgba(255,255,255,0.5),
    inset 0 -10px 15px rgba(255,255,255,0.2),
    inset 10px 0 15px rgba(255,255,255,0.2),
    inset -10px 0 15px rgba(255,255,255,0.2),
    0 10px 30px rgba(0,0,0,0.3);
  animation: floatUp var(--speed) linear infinite, wobble var(--wobble-speed) ease-in-out infinite alternate;
}
.bubble::after {
  content: ''; position: absolute; top: 18%; left: 18%; width: 22%; height: 22%;
  background: radial-gradient(circle, #fff 0%, rgba(255,255,255,0.8) 40%, transparent 100%);
  border-radius: 50%; filter: blur(0.5px); transform: rotate(-35deg);
  box-shadow: 0 0 10px #fff;
}

@keyframes floatUp {
  0% { transform: translateY(0) scale(0.7); opacity: 0; }
  5% { opacity: 0.95; }
  95% { opacity: 0.95; }
  100% { transform: translateY(-135vh) scale(1.4); opacity: 0; }
}
@keyframes wobble {
  0% { margin-left: -40px; }
  100% { margin-left: 40px; }
}

@media (max-width: 1200px) {
  :root { --grid-cols: 3; --shop-gap: 40px; }
  .grid { gap: 20px; }
}

@media (max-width: 900px) {
  :root { --grid-cols: 2; --shop-gap: 20px; --nav-padding: 10px 20px; }
  .nav { flex-direction: column; gap: 15px; }
  .search-wrap { max-width: 100%; }
  .nav-actions { width: 100%; justify-content: space-between; }
  .shop-wrap { flex-direction: column; padding: 0 15px; }
  .sidebar { 
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
    z-index: 4000; background: var(--bg-start);

    transition: var(--tr); overflow-y: auto;
  }

  .sidebar .cat-list { flex-direction: column; }
  .main { padding: 20px 0; }
  .hero { height: 350px; }

  .footer-grid { grid-template-columns: 1fr; gap: 40px; }

}

@media (max-width: 600px) {

  .card-info { padding: 12px 10px; }
  .card-name { font-size: 0.9rem; }
  .card-price { font-size: 1.1rem; }
  .modal { flex-direction: column; max-height: 95vh; border-radius: 20px; }
  .m-gallery { border-right: none; border-bottom: 1px solid var(--border); height: 300px; padding: 15px; }
  .m-thumbs { width: 60px; gap: 8px; }
  .m-thumb { height: 60px; }
  .m-info { padding: 25px; gap: 20px; }
  .m-name { font-size: 1.8rem; }
  .m-price { font-size: 30px; }
  .btn-cart, .btn-wa { padding: 16px; font-size: 0.9rem; }
  .basket { width: 100%; padding: 30px; }
}

/* Animations */
.bubble {
  position: fixed; pointer-events: none;
  background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), transparent 70%),
              radial-gradient(circle at 70% 70%, rgba(219, 39, 119, 0.1), transparent 70%);
  border-radius: 50%; border: 0.5px solid rgba(255,255,255,0.4);
  box-shadow: inset 0 0 20px rgba(255,255,255,0.5), 
              inset -5px -5px 15px rgba(255,255,255,0.2),
              0 10px 20px rgba(0,0,0,0.1);
  z-index: 10000; animation: bubbleBurst 1s cubic-bezier(0.1, 0.8, 0.2, 1) forwards;
  backdrop-filter: blur(2px);
}
@keyframes bubbleBurst {
  0% { transform: scale(0) translate(0, 0); opacity: 0; }
  20% { opacity: 1; transform: scale(1) translate(0,0); }
  100% { transform: scale(1.8) translate(var(--dx), var(--dy)); opacity: 0; }
}

.confetti {
  position: fixed; pointer-events: none; z-index: 10000;
  width: 12px; height: 12px; animation: confettiFall 3.5s cubic-bezier(0.1, 0.5, 0.2, 1) forwards;
  border-radius: 2px;
}
@keyframes confettiFall {
  0% { transform: translateY(-50px) translateX(0) rotate(0); opacity: 1; }
  25% { transform: translateY(25vh) translateX(var(--dx1)) rotate(180deg); }
  50% { transform: translateY(50vh) translateX(var(--dx2)) rotate(360deg); }
  75% { transform: translateY(75vh) translateX(var(--dx1)) rotate(540deg); }
  100% { transform: translateY(110vh) translateX(var(--dx2)) rotate(720deg); opacity: 0; }
}

.anim-toggle {
  background: rgba(255,255,255,0.05); border: 1px solid var(--border);

}

.anim-toggle.off { opacity: 0.5; filter: grayscale(1); }

/* Control Center */
.cc-trigger {
  position: fixed; bottom: 30px; left: 30px; width: 55px; height: 55px;

  cursor: pointer; z-index: 4000; transition: var(--tr); box-shadow: var(--sh);

}

.cc-panel {

  border-radius: 24px; border: 1px solid var(--border);

}
.cc-panel.open { transform: translateY(0); opacity: 1; pointer-events: all; }

.cc-h { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 3px; font-weight: 900; color: var(--accent); margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }

.cc-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.cc-label { font-size: 0.85rem; font-weight: 700; color: #fff; }

/* Premium Switch */
.sw { position: relative; display: inline-block; width: 50px; height: 26px; }
.sw input { opacity: 0; width: 0; height: 0; }
.sw-slider {
  position: absolute; cursor: pointer; inset: 0; background: rgba(255,255,255,0.1);
  transition: .4s; border-radius: 34px; border: 1px solid var(--border);
}
.sw-slider:before {
  position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 3px;
  background-color: #fff; transition: .4s; border-radius: 50%;
}
input:checked + .sw-slider { background: var(--accent); border-color: var(--accent); }
input:checked + .sw-slider:before { transform: translateX(24px); }
input:checked + .sw-slider { box-shadow: 0 0 15px var(--accent-glow); }

.sys-input {
  width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border);
  border-radius: 12px; padding: 10px 15px; color: #fff; font-size: 0.8rem;
  font-weight: 700; outline: none; transition: var(--tr);
}
.sys-input:focus { border-color: var(--accent); background: rgba(255,255,255,0.06); }
.sys-label { display: block; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.6; margin-bottom: 8px; font-weight: 800; }
.sys-row { margin-bottom: 20px; }

</style>

<body id="b-root" onclick="if(window.C && window.C.animsOn && (event.target.tagName==='BUTTON' || event.target.closest('button') || event.target.closest('.card'))) window.C.createBubbles(event.clientX, event.clientY)">
<div id="root"></div>
<div id="toast" class="toast">✨ Added to Bag</div>

<script>
(function() {
  'use strict';
  let _DATA = window.__D__ || null;
  let _PL = [];
  let _B = [];
  let _CONF = {};
  let _IS_EDITOR = false;

  const U = {
    unit: (v, def) => { if (!v) return def; v = String(v).trim(); return /^\d+$/.test(v) ? v + 'px' : v; },
    e: (s) => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'),
    price: (p) => '₹' + Math.round(p).toLocaleString('en-IN'),
    fmtId: (id, num) => {
      const n = num || (typeof _PL !== 'undefined' ? _PL.find(p => p.id === id)?.productNumber : null);
      return '#' + String(n || id).replace(/D/g, '').padStart(3, '0');
    },
    editAttr: (k,isP) => _IS_EDITOR ? ' contenteditable="true" class="editable" onblur="' + (isP ? 'C.saveP(\''+k+'\',this.innerText)' : 'C.saveE(\''+k+'\',this.innerText)') + '"' : ''
  };

  const C = {
    cat: 'all', q: '', minP: 0, maxP: 0, fSz: '', fClr: '', animsOn: true, curPg: 1,
    
    async init() {
      try {
        const urlParams = new URLSearchParams(window.location.search);
        _IS_EDITOR = urlParams.get('edit') === '1';
        if (_IS_EDITOR) document.getElementById('b-root').classList.add('is-editor');
        
        const storedAnims = localStorage.getItem('bq_anims_on');
        if (storedAnims !== null) this.animsOn = storedAnims === 'true';

        console.log('Elite Boutique: Initializing...');
        const ls = localStorage.getItem('bq_shop_preview');
        if (ls) { 
           const data = JSON.parse(ls); if (data) { this.setup(data); return; }
        }

        // 1. Fetch Manifest
        const r = await fetch('data/products.json?v='+Date.now());
        if (r.ok) { 
           const manifest = await r.json();
           if (manifest) {
              _DATA = manifest;
              _CONF = manifest.settings || {};
              // 2. Fetch First Page or all if small
              await this.loadPage(1);
              this.setup(manifest); 
              return;
           }
        }
      } catch(e) { console.error('Elite Boutique Init Error:', e); }
    },

    async loadPage(num) {
      if (!num) return;
      this.curPg = num;
      try {
        const r = await fetch('data/p' + num + '.json?v=' + Date.now());
        if (r.ok) {
          const prods = await r.json();
          _PL = prods || [];
          this.refreshGrid(true);
          window.scrollTo({top: 0, behavior: 'smooth'});
        }
      } catch(e) { console.error('Error loading page:', e); }
    },

    setup(data) {
      console.log('Elite Boutique: Setting up...');
      _DATA = data; 
      _CONF = data.settings || {};
      
      // If products are already in the data (Preview Mode), load them immediately
      if (data.products && data.products.length > 0) {
        _PL = data.products;
      }

      const r = document.documentElement; const s = _CONF;
      r.style.setProperty('--bg-start', s.colorBg || '#0a0e1a');
      r.style.setProperty('--bg-end', s.colorBg2 || '#0f172a');
      r.style.setProperty('--card', s.colorCard || '#161e2e');
      r.style.setProperty('--accent', s.colorAccent || '#db2777');
      r.style.setProperty('--text', s.colorText || '#f8fafc');
      r.style.setProperty('--text-mute', s.colorTextMute || '#94a3b8');
      r.style.setProperty('--radius', U.unit(s.shopRadius, '16px'));
      r.style.setProperty('--btn-radius', U.unit(s.shopButtonRadius, '50px'));
      r.style.setProperty('--h-font', s.shopHeadingFont || "'Outfit', sans-serif");
      r.style.setProperty('--grid-cols', s.shopGridCols || 4);
      r.style.setProperty('--logo-size', U.unit(s.shopLogoSize, '50px'));
      r.style.setProperty('--nav-padding', U.unit(s.shopNavPadding, '16px 40px'));
      r.style.setProperty('--hero-height', U.unit(s.shopHeroHeight, '600px'));
      r.style.setProperty('--grid-gap', U.unit(s.shopGridGap, '35px'));
      
      // Luxury Layout Controls
      r.style.setProperty('--sidebar-width', U.unit(s.sidebarWidth, '320px'));
      r.style.setProperty('--shop-gap', U.unit(s.shopGap, '60px'));
      r.style.setProperty('--shop-max-width', U.unit(s.shopMaxWidth, '1600px'));

      // Hero Alignment
      this.heroAlign = s.shopHeroAlign === 'center' ? 'center' : 'flex-start';
      r.style.setProperty('--hero-align', this.heroAlign);
      r.style.setProperty('--hero-text-align', this.heroAlign === 'center' ? 'center' : 'left');
      
      if (s.shopAnimsEnabled !== undefined) {
        this.animsOn = s.shopAnimsEnabled === 'true' || s.shopAnimsEnabled === true;
      }

      if (s.shopHeroAuto !== undefined) {
        this.heroAuto = s.shopHeroAuto === 'true' || s.shopHeroAuto === true;
      } else {
        this.heroAuto = true;
      }

      this.loadB(); this.render(); this.bind();
    },

    toggleAnims() {
      this.animsOn = !this.animsOn;
      localStorage.setItem('bq_anims_on', this.animsOn);
    },

    render() {
      let h = '';
      const layout = _CONF.shopLayout ? JSON.parse(_CONF.shopLayout) : [
        {id:'ann', active:true}, {id:'hero', active:true}, {id:'cats', active:true}, {id:'grid', active:true}, {id:'test', active:true}, {id:'badges', active:true}
      ];

      // Sections mapping
      const sections = {
        ann: () => {
          let annText = _CONF.shopAnnText;
          if (!annText && !_IS_EDITOR) return '';
          if (!annText) annText = "✨ Exclusive Women's Couture — Signature Selection ✨";
          return '<div class="ann-bar"' + U.editAttr('shopAnnText') + '>' + annText + '</div>';
        },
        nav: () => {
          const logo = (_DATA.shopLogo) ? '<img src="'+_DATA.shopLogo+'" class="logo-img">' : '<span>' + (_DATA.shopName || 'Luxe Boutique') + '</span>';
          return '<nav class="nav"><div class="logo-box">' + logo + '</div>' +
               '<div class="search-wrap"><input type="search" id="s-input" placeholder="Search Signature Collections..."><span class="search-icon">🔍</span></div>' +
               '<div class="nav-actions">' +
               '<button class="cart-btn" onclick=\'C.openB()\'>🛍️ Bag (<span id="c-count">' + this.getBCnt() + '</span>)</button>' +
               '<a href="#footer" class="nav-contact" onclick=\'event.preventDefault(); document.querySelector(".shop-footer").scrollIntoView({behavior:"smooth"});\'>📞 Contact Us: ' + (_CONF.shopPhone || "+91 00000 00000") + '</a>' +
               '</div></nav>';
        },
        hero: () => {
          if (_CONF.shopHeroEnabled === 'false') return '';
          return this.getHero();
        },
        test: () => this.getTestimonials(),
        badges: () => this.getValues()
      };

      // Ensure Nav is always there at top if not in layout
      h += sections.nav();

      layout.forEach(item => {
        if (!item.active) return;
        
        // Handle Hero Placement Override
        if (item.id === 'hero' && _CONF.shopHeroPlacement === 'top') return; // Handled later
        if (item.id === 'hero' && _CONF.shopHeroPlacement === 'center') return; // Handled later
        
        if (item.id === 'ann') h = sections.ann() + h; 
        else if (item.id === 'hero') h += sections.hero();
        else if (item.id === 'cats' || item.id === 'grid') {
          if (!h.includes('shop-wrap')) {
             let sw = '<div class="shop-wrap"><aside class="sidebar" id="sidebar">' +
               '<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;" class="mobile-only">' +
               '<h3 class="side-h" style="margin:0;">Refine Search</h3><span style="font-size:1.5rem; cursor:pointer;" onclick="document.getElementById(\'sidebar\').classList.remove(\'open\')">✕</span>' +
               '</div>' +
               '<div class="side-sec"><h3 class="side-h">Collections</h3><div class="cat-list">' + this.getCatList() + '</div></div>' +
               '<div class="side-sec"><h3 class="side-h">Price Range</h3>' +
               '<div class="f-compact">' +
               '<div class="f-input-wrap"><span class="f-input-label">Minimum</span><div class="f-input-row">₹ <input type="number" id="min-p" placeholder="0" onchange=\'C.setPF(this.value, null)\'></div></div>' +
               '<span class="f-dash">—</span>' +
               '<div class="f-input-wrap"><span class="f-input-label">Maximum</span><div class="f-input-row">₹ <input type="number" id="max-p" placeholder="10,000+" onchange=\'C.setPF(null, this.value)\'></div></div>' +
               '</div></div>' +
               '<div class="side-sec"><h3 class="side-h">Elite Sizes</h3><div class="sz-list">' + this.getSzFilter() + '</div></div>' +
               '<div class="side-sec"><h3 class="side-h">Curated Colors</h3><div class="clr-list">' + this.getClrFilter() + '</div></div>' +
               '<div class="side-sec" style="border:none;"><button class="btn-clear" onclick=\'C.clearF()\'>✨ Clear Filters</button></div>' +
               '</aside>';
             
             let mainContent = '<main class="main">';
             mainContent += '<div class="mobile-cats"><div class="cat-list">' + this.getCatList() + '</div></div>';
             mainContent += '<button class="filter-trigger" onclick="document.getElementById(\'sidebar\').classList.add(\'open\')">🔍 Filter & Refine</button>';
             
             if (_CONF.shopHeroPlacement === 'center') mainContent += sections.hero();
             mainContent += '<div id="p-grid"></div><div id="pg-wrap"></div></main>';
             
             sw += mainContent + '</div>';
             h += sw;
          }
        }
        else if (item.id === 'test') h += sections.test();
        else if (item.id === 'badges') h += sections.badges();
      });

      // Top Placement Override
      if (_CONF.shopHeroPlacement === 'top') {
          h = sections.hero() + h;
      }

      h += this.getFooter();
      h += '<div class="modal-over" id="m-over" onclick=\'if(event.target===this)C.closeM("m-over")\'></div>';
      h += '<div class="basket-over" id="b-over" onclick=\'if(event.target===this)C.closeM("b-over")\'></div>';
      document.getElementById('root').innerHTML = h; this.refreshGrid(true); this.initSlider(); this.initBubbles();
    },

    getFooter() {
      const s = _CONF;
      const addr = s.shopAddress || '123 Elite Street, Signature Square';
      const ph = s.shopPhone || '+91 00000 00000';
      const insta = s.shopInsta || '@luxe.boutique';
      const yt = s.shopYoutube || '#';
      const name = (_DATA.shopName || 'Luxe Boutique').toUpperCase();

      return '<footer class="shop-footer">' +
        '<div class="footer-grid">' +
          '<div class="footer-col">' +
            '<h4 class="footer-h">' + name + '</h4>' +
            '<p class="footer-p">Defining feminine elegance through curated signature collections. Every piece is a journey of style and grace.</p>' +
          '</div>' +
          '<div class="footer-col">' +
            '<h4 class="footer-h">Quick Links</h4>' +
            '<div class="footer-links">' +
              '<a href="#" onclick="location.reload()">Home</a>' +
              '<a href="#" onclick=\'C.setCat("all",null)\'>All Collections</a>' +
              '<a href="#" onclick=\'C.openB()\'>View Bag</a>' +
            '</div>' +
          '</div>' +
          '<div class="footer-col">' +
            '<h4 class="footer-h">Contact Us</h4>' +
            '<div class="footer-contact">' +
              '<div>📍 ' + addr + '</div>' +
              '<div>📞 ' + ph + '</div>' +
              '<a href="https://instagram.com/' + insta.replace('@','') + '" target="_blank">📸 Instagram: ' + insta + '</a>' +
              '<a href="' + yt + '" target="_blank">🎥 Watch Product Journey</a>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="footer-bottom">© 2026 ' + name + ' — All Rights Reserved.</div>' +
      '</footer>';
    },

    getHero() {
      const news = [..._PL].sort((a,b) => new Date(b.createdAt||b.updatedAt) - new Date(a.createdAt||a.updatedAt)).slice(0, 5);
      if (!news.length) return '';
      let h = '<section class="hero"><div class="slider" id="main-slider">';
      h += news.map(p => {
        return '<div class="slide"><img src="' + (p.photos?.[0]?.data||'') + '"><div class="slide-cnt"><span style="color:var(--accent); font-weight:900; letter-spacing:5px; text-transform:uppercase; font-size:0.8rem; margin-bottom:15px;">New Arrival</span><h2 class="slide-h"' + U.editAttr('shopHeroTitle') + '>' + p.name + '</h2><button class="slide-btn" onclick=\'C.openD("' + p.id + '")\'>Shop The Look</button></div></div>';
      }).join('');
      h += '</div></section>';
      return h;
    },

    getValues() {
      return '<section class="values-sec">' +
        '<div class="val-card"><div class="val-icon">💎</div><h4 class="val-h">Premium Fabric</h4><p class="val-p">Hand-selected silks and linens for the modern woman.</p></div>' +
        '<div class="val-card"><div class="val-icon">✨</div><h4 class="val-h">Curated Design</h4><p class="val-p">Exclusive silhouettes that define luxury and grace.</p></div>' +
        '<div class="val-card"><div class="val-icon">🚚</div><h4 class="val-h">Elite Delivery</h4><p class="val-p">Complementary white-glove shipping on all signature pieces.</p></div>' +
        '</section>';
    },

    getTestimonials() {
       let list = [];
       try { list = JSON.parse(_CONF.shopTestimonials || '[]'); } catch(e) {}
       if(!list.length) list = [
         { name: "Priya Sharma", text: "The quality of the silk saree is absolutely stunning. Truly signature excellence!" },
         { name: "Ananya Iyer", text: "Fits perfectly! The luxury packaging and speed of delivery was impressive." },
         { name: "Meera Reddy", text: "Studio inspected quality shows. My go-to boutique for every occasion." }
       ];
       let h = '<section class="testi-sec"><h4 class="testi-h">The Luxe Voice</h4><div class="testi-grid">';
       h += list.map((t, i) => '<div class="testi-card"><div class="testi-stars">★★★★★</div><p class="testi-txt"' + U.editAttr('shopTestiTxt_'+i) + '>' + t.text + '</p><div class="testi-user"' + U.editAttr('shopTestiName_'+i) + '>' + t.name.toUpperCase() + '</div></div>').join('');
       h += '</div></section>';
       return h;
    },

    initSlider() {
      const s = document.getElementById('main-slider'); if(!s) return;
      let c = 0; 
      if (s.children.length > 1 && this.heroAuto !== false) {
        setInterval(() => { c = (c+1)%s.children.length; s.style.transform = 'translateX(-' + (c*100) + '%)'; }, 5000);
      }
    },

    getCatList() {
      const icons = {
        all: '<svg class="cat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>',
        premium: '<svg class="cat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 3h12l4 6-10 12L2 9z"></path></svg>',
        silk: '<svg class="cat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 22a8 8 0 0 1 8-8c5 0 5 4 12 4"></path><path d="M22 2a8 8 0 0 0-8 8c0 5 4 5 4 12"></path></svg>',
        western: '<svg class="cat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11h18v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V11z"></path><path d="M8 11V9a4 4 0 1 1 8 0v2"></path></svg>',
        bottoms: '<svg class="cat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2v20h4L12 10l2 12h4V2z"></path></svg>',
        accessories: '<svg class="cat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>'
      };

      let h = '<div class="cat-item-wrap"><button class="cat-btn ' + (this.cat==='all'?'active':'') + '" onclick=\'C.setCat("all",this)\'>' + icons.all + ' <span>All Pieces</span> <span class="cat-chevron">❯</span></button></div>';
      
      (_DATA.categories||[]).forEach(c => { 
        let name = c.name;
        let low = name.toLowerCase();
        let ic = icons.all;
        if(low.includes('kurtis')) ic = icons.premium;
        else if(low.includes('silk') || low.includes('saree')) ic = icons.silk;
        else if(low.includes('western')) ic = icons.western;
        else if(low.includes('bottom') || low.includes('legging')) ic = icons.bottoms;
        else if(low.includes('access')) ic = icons.accessories;

        h += '<div class="cat-item-wrap"><button class="cat-btn ' + (this.cat===c.id?'active':'') + '" onclick=\'C.setCat("' + c.id + '",this)\'>' + ic + ' <span>' + name + '</span> <span class="cat-chevron">❯</span></button></div>'; 
      });
      return h;
    },

    getSzFilter() {
      const all = [...new Set(_PL.flatMap(p => p.variants?.flatMap(v => v.sizes?.map(s => s.size.toUpperCase()))))].filter(Boolean).sort();
      return all.map(s => '<div class="sz-pill ' + (this.fSz===s?'active':'') + '" onclick=\'C.setSF("' + s + '",this)\'>' + s + '</div>').join('');
    },

    getClrFilter() {
      const all = [...new Set(_PL.flatMap(p => p.variants?.map(v => v.color)))].filter(Boolean).sort();
      return all.map(c => '<div class="clr-pill ' + (this.fClr===c?'active':'') + '" onclick=\'C.setCF("' + c + '",this)\'>' + c + '</div>').join('');
    },

    refreshGrid(reset) {
      if (reset) { window._OFFSET = 0; window._FILTERED = this.getFiltered(); }
      const container = document.getElementById('p-grid'); if(!container) return;
      container.innerHTML = '<div class="grid">' + window._FILTERED.map(p => this.getPCard(p)).join('') + '</div>';
      this.renderPagination();
    },

    renderPagination() {
      const wrap = document.getElementById('pg-wrap'); if(!wrap) return;
      const total = _DATA.totalPages || 1;
      if (total <= 1) { wrap.innerHTML = ''; return; }

      let h = '<div class="pagination">';
      h += '<span class="pg-info">Page ' + this.curPg + ' of ' + total + '</span>';
      
      for (let i = 1; i <= total; i++) {
        h += '<button class="pg-btn ' + (i===this.curPg?'active':'') + '" onclick="C.loadPage(' + i + ')">' + i + '</button>';
      }
      h += '</div>';
      wrap.innerHTML = h;
    },

    getFiltered() {
      return _PL.filter(p => {
        const sell = Math.min(...(p.variants||[]).flatMap(v => (v.sizes||[]).map(s => s.sellPrice)));
        const pSzs = (p.variants||[]).flatMap(v => v.sizes?.map(s => s.size.toUpperCase()));
        const pClrs = (p.variants||[]).map(v => v.color);
        if(this.cat!=='all' && String(p.categoryId) !== String(this.cat)) return false;
        if(this.q && !p.name.toLowerCase().includes(this.q.toLowerCase())) return false;
        if(this.minP > 0 && sell < this.minP) return false;
        if(this.maxP > 0 && sell > this.maxP) return false;
        if(this.fSz && !pSzs.includes(this.fSz)) return false;
        if(this.fClr && !pClrs.includes(this.fClr)) return false;
        return true;
      });
    },

    getPCard(p) {
      const sell = Math.min(...(p.variants||[]).flatMap(v => (v.sizes||[]).map(s => s.sellPrice)));
      const isNew = new Date() - new Date(p.createdAt||p.updatedAt) < 7*24*60*60*1000;
      const badge = isNew ? '<span style="position:absolute; top:15px; left:15px; background:var(--accent); color:#fff; padding:6px 12px; border-radius:50px; font-size:0.65rem; font-weight:900; z-index:10; letter-spacing:1px; text-transform:uppercase;">New Season</span>' : '';
      
      return '<div class="card" onclick=\'C.openD("' + p.id + '", event)\'>' + badge + '<div class="card-img"><img src="' + (p.photos?.[0]?.data||'') + '"></div><div class="card-info"><div class="card-id">' + U.fmtId(p.id, p.productNumber) + '</div><div class="card-name">' + p.name + '</div><div class="card-price">' + U.price(sell) + '</div></div></div>';
    },

    createBubbles(x, y) {
      if (!this.animsOn) return;
      const colors = [
        'rgba(255, 105, 180, 0.2)', /* Pink */
        'rgba(135, 206, 235, 0.2)', /* Blue */
        'rgba(255, 215, 0, 0.2)',   /* Gold */
        'rgba(230, 230, 250, 0.2)'  /* Lavender */
      ];
      for (let i = 0; i < 12; i++) {
        const b = document.createElement('div');
        b.className = 'bubble';
        const size = Math.random() * 15 + 5;
        b.style.width = size + 'px';
        b.style.height = size + 'px';
        b.style.left = x + 'px';
        b.style.top = y + 'px';
        b.style.background = 'radial-gradient(circle at 30% 30%, rgba(255,255,255,0.7), ' + colors[Math.floor(Math.random() * colors.length)] + ')';
        b.style.setProperty('--dx', (Math.random() - 0.5) * 200 + 'px');
        b.style.setProperty('--dy', (Math.random() - 0.5) * 200 + 'px');
        document.body.appendChild(b);
        setTimeout(() => b.remove(), 1000);
      }
    },

    createShower() {
      if (!this.animsOn) return;
      const colors = ['#db2777', '#fbcfe8', '#ffffff', '#fbbf24', '#3b82f6', '#22c55e'];
      for (let i = 0; i < 80; i++) {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.style.left = Math.random() * 100 + 'vw';
        c.style.top = '-20px';
        c.style.background = colors[Math.floor(Math.random() * colors.length)];
        c.style.setProperty('--dx1', (Math.random() - 0.5) * 300 + 'px');
        c.style.setProperty('--dx2', (Math.random() - 0.5) * 300 + 'px');
        c.style.animationDelay = (Math.random() * 2) + 's';
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 4000);
      }
    },

    openD(id) {
       const p = _PL.find(x=>x.id===id); if(!p) return;
       const sell = Math.min(...(p.variants||[]).flatMap(v => (v.sizes||[]).map(s => s.sellPrice)));
       const sizes = [...new Set(p.variants?.flatMap(v => v.sizes?.map(s => s.size)))].filter(Boolean);
       const perks = JSON.parse(_CONF.shopBadges || '[{"icon":"🎀","text":"Signature Couture"},{"icon":"👑","text":"Elite Quality Checked"}]');
       const hash = id.split('').reduce((a, b) => { a = ((a << 5) - a) + b.charCodeAt(0); return a & a; }, 0);
       const disc = 40 + (Math.abs(hash) % 21); // 40-60%
       const oldP = sell / (1 - (disc / 100));
       const el = document.getElementById('m-over');

       const vBtn = (p.videoUrl||p.videoLink) ? '<button class="btn-video" onclick=\'window.open("' + (p.videoUrl||p.videoLink) + '","_blank")\'>🎬 WATCH PRODUCT JOURNEY</button>' : '';

       const rating = (4.0 + (Math.abs(hash) % 10) / 10).toFixed(1);

       let info = '<div class="m-id">' + U.fmtId(p.id, p.productNumber) + '</div><div style="display:flex; justify-content:space-between; align-items:flex-start;"><div style="flex:1;"><h2 class="m-name">' + p.name + '</h2><div style="color:var(--accent); font-size:0.8rem; font-weight:900; margin-top:5px; letter-spacing:2px; text-transform:uppercase;">Studio Selection</div></div><div style="background:var(--accent-glow); color:var(--accent); padding:10px 15px; border-radius:12px; font-size:0.7rem; font-weight:900; text-align:center; border:1px solid var(--accent);"><span style="font-size:1rem;">' + rating + '</span><br>RATING</div></div>';
       info += '<div class="m-price-box">' +
         '<div class="m-disc-tag" style="background:var(--accent); color:#fff; display:inline-block; padding:2px 8px; font-weight:900; font-size:0.7rem; margin-bottom:5px; border-radius:4px;">' + disc + '% OFF</div>' +
         '<div class="m-old-price" style="opacity:0.4; font-size:1.2rem; font-weight:700; text-decoration:line-through; margin-bottom:5px;">' + U.price(oldP) + '</div>' +
         '<div style="display:flex; align-items:baseline; gap:10px;">' +
         '<span class="m-price" style="font-size:40px; font-weight:800; color:var(--text);">' + U.price(sell) + '</span><span style="opacity:0.6; font-size:0.85rem; font-weight:600;">+ Shipping</span>' +
         '</div></div>';
       info += '<div class="m-sz-sec"><h4>SELECT SIZE</h4><div class="m-sizes">' + sizes.map(s => '<button class="m-sz-btn" onclick=\'C.selCSz(this,"' + s + '")\'>' + s + '</button>').join('') + '</div></div>';
       info += '<div class="m-actions">' + vBtn + '<button class="btn-cart" onclick=\'C.addB("' + p.id + '")\'>🛒 ADD TO BAG</button><button class="btn-wa" onclick=\'C.directWA("' + p.id + '")\'>⚡ ORDER VIA WHATSAPP</button></div>';
       info += '<div style="margin-top:10px; display:grid; grid-template-columns:1fr 1fr; gap:10px;">' + perks.map((pk, i) => {
         const icon = pk.icon || '🛍️';
         const text = typeof pk === 'string' ? pk : (pk.text || 'Signature Perk');
         return '<div class="m-feat-item"><span>' + icon + '</span><span class="m-feat-text"' + U.editAttr('BadgeText_'+i, true) + '>' + text + '</span></div>';
       }).join('') + '</div>';

       el.innerHTML = '<div class="modal"><button class="m-close" onclick=\'C.closeM("m-over")\'>✕</button>' +
         '<div class="m-gallery"><div class="m-thumbs">' + p.photos.map((ph,idx) => '<img src="' + ph.data + '" class="m-thumb ' + (idx===0?'active':'') + '" onclick="C.setMImg(this)">').join('') + '</div>' + 
         '<div class="m-img-main-wrap"><img src="' + (p.photos?.[0]?.data||'') + '" class="m-img-main" id="m-main"></div></div>' +
         '<div class="m-info">' + info + '</div></div>';
       el.classList.add('open'); el.dataset.selSz = '';
    },

    setPF(min, max) { if(min!==null) this.minP = parseFloat(min)||0; if(max!==null) this.maxP = parseFloat(max)||0; this.refreshGrid(true); },
    setSF(s, t) { this.fSz = (this.fSz===s) ? '' : s; document.querySelectorAll('.sz-pill').forEach(x=>x.classList.remove('active')); if(this.fSz) t.classList.add('active'); this.refreshGrid(true); },
    setCF(c, t) { this.fClr = (this.fClr===c) ? '' : c; document.querySelectorAll('.clr-pill').forEach(x=>x.classList.remove('active')); if(this.fClr) t.classList.add('active'); this.refreshGrid(true); },
    setCat(id, t) { this.cat = id; document.querySelectorAll('.cat-btn').forEach(x=>x.classList.remove('active')); if(t) t.classList.add('active'); this.refreshGrid(true); },
    clearF() {
      this.cat = 'all'; this.q = ''; this.minP = 0; this.maxP = 0; this.fSz = ''; this.fClr = '';
      const sInput = document.getElementById('s-input'); if(sInput) sInput.value = '';
      const minP = document.getElementById('min-p'); if(minP) minP.value = '';
      const maxP = document.getElementById('max-p'); if(maxP) maxP.value = '';
      document.querySelectorAll('.cat-btn, .sz-pill, .clr-pill').forEach(x=>x.classList.remove('active'));
      const allBtn = document.querySelector('.cat-btn'); if(allBtn) allBtn.classList.add('active');
      this.refreshGrid(true);
    },
    selCSz(t, s) { document.querySelectorAll('.m-sz-btn').forEach(x=> { x.style.background='transparent'; x.style.color='var(--text)'; x.style.borderColor='var(--border)'; }); t.style.background='var(--accent)'; t.style.color='#fff'; t.style.borderColor='var(--accent)'; document.getElementById('m-over').dataset.selSz = s; },
    setMImg(t) { document.querySelectorAll('.m-thumb').forEach(x=>x.classList.remove('active')); t.classList.add('active'); document.getElementById('m-main').src = t.src; },
    closeM(id) { document.getElementById(id).classList.remove('open'); },

    addB(id) {
       const sz = document.getElementById('m-over').dataset.selSz; if(!sz) { alert('Please select a size first!'); return; }
       const p = _PL.find(x=>x.id===id);
       const price = Math.min(...(p.variants||[]).flatMap(v => (v.sizes||[]).map(s => s.sellPrice)));
       const existing = _B.find(x => x.id === id && x.size === sz);
       if(existing) { existing.qty++; this.toast('✨ Quantity Increased!'); }
       else { _B.push({ id, name: p.name, size: sz, price, qty: 1, productNumber: p.productNumber }); this.toast('✨ Added to Bag!'); }
       this.createShower();
       this.saveB(); this.uB(); this.closeM('m-over'); this.openB();
    },
    setQty(i, d) { _B[i].qty += d; if(_B[i].qty <= 0) _B.splice(i, 1); this.saveB(); this.uB(); this.openB(); },
    toast(m) { const t = document.getElementById('toast'); t.innerText = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); },
    saveB() { localStorage.setItem('bq_basket', JSON.stringify(_B)); },
    loadB() { _B = JSON.parse(localStorage.getItem('bq_basket') || '[]'); },
    getBCnt() { return _B.reduce((a,b) => a + (b.qty||1), 0); },
    uB() { const c = document.getElementById('c-count'); if(c) c.innerText = this.getBCnt(); },

    openB() {
       const el = document.getElementById('b-over');
       let total = _B.reduce((a,b) => a + ((b.price||0) * (b.qty||1)), 0);
       let h = '<div class="basket"><div class="b-header"><h2>Shopping Bag</h2><span class="b-close" onclick="C.closeM(\'b-over\')">✕</span></div>';
       h += '<div class="b-list">';
       if(!_B.length) h += '<p style="padding:40px; text-align:center; opacity:0.5;">Your bag is empty.</p>';
       else {
          h += _B.map((x,i) => '<div class="b-item"><div class="b-item-info"><b>' + x.name + '</b><span>' + x.size + '</span><br><small style="opacity:0.6;">' + U.price(x.price) + '</small></div>' +
               '<div class="b-qty-ctrl"><button class="b-qty-btn" onclick="C.setQty('+i+',-1)">-</button><span class="b-qty">' + (x.qty||1) + '</span><button class="b-qty-btn" onclick="C.setQty('+i+',1)">+</button></div>' +
               '</div>').join('');
       }
       h += '</div><div class="b-footer"><div class="b-total"><span>Subtotal</span><span>' + U.price(total) + '</span></div><button class="btn-wa" style="width:100%;" onclick="C.orderByWA()">PROCEED TO CHECKOUT</button></div></div>';
       el.innerHTML = h; el.classList.add('open');
    },

    orderByWA() {
       const ph = (_CONF.whatsappNumber || '').replace(/\D/g,'');
       let msg = '*Elite Boutique Order Bag*\n\nI want to order:\n';
       _B.forEach(x => { msg += '- ' + (x.qty||1) + ' x ' + x.name + ' (' + U.fmtId(x.id, x.productNumber) + ') (Size: ' + x.size + ')\n'; });
       window.open('https://wa.me/' + ph + '?text=' + encodeURIComponent(msg), '_blank');
    },

    directWA(id) {
       const p = _PL.find(x => x.id === id); const sz = document.getElementById('m-over').dataset.selSz;
       if (!sz) { alert('Select size first!'); return; }
       const ph = (_CONF.whatsappNumber || '').replace(/\D/g,'');
       let msg = '*Product Inquiry*\n\nI want to order: *' + p.name + '* (' + U.fmtId(p.id, p.productNumber) + ')\nSize: ' + sz;
       window.open('https://wa.me/' + ph + '?text=' + encodeURIComponent(msg), '_blank');
    },

    saveE(k,v) { 
      if(!_IS_EDITOR) return;
      if(k.startsWith('shopTesti')) {
        let list = JSON.parse(_CONF.shopTestimonials || '[]');
        const [key, idx] = k.split('_');
        if(!list[idx]) list[idx] = { name: "", text: "" };
        if(key === 'shopTestiTxt') list[idx].text = v;
        if(key === 'shopTestiName') list[idx].name = v;
        _CONF.shopTestimonials = JSON.stringify(list);
      } else if(k === 'shopName') { _DATA.shopName = v; } 
      else { _CONF[k] = v; }
      localStorage.setItem('bq_shop_preview', JSON.stringify(_DATA)); 
    },
    saveP(k,v) { 
      if(!_IS_EDITOR) return;
      if(k.startsWith('BadgeText_')) {
        let perks = JSON.parse(_CONF.shopBadges || '[]');
        const idx = k.split('_')[1];
        if(perks[idx]) perks[idx].text = v;
        _CONF.shopBadges = JSON.stringify(perks);
      }
      localStorage.setItem('bq_shop_preview', JSON.stringify(_DATA)); 
    },
      initBubbles() {
        setTimeout(() => {
          if (this.animsOn === false) return;
          const old = document.getElementById('bubble-container');
          if (old) old.remove();
          
          const container = document.createElement('div');
          container.id = 'bubble-container';
          document.body.appendChild(container);

          // Start naturally from the bottom (No instant burst on launch)
          setInterval(() => {
            if (this.animsOn !== false && document.querySelectorAll('.bubble').length < 20) {
              this.spawnBubble(container);
            }
          }, 1200);
        }, 100);
      },

      spawnBubble(container, initial = false) {
        const b = document.createElement('div');
        b.className = 'bubble';
        const size = Math.random() * 60 + 20 + 'px';
        b.style.width = size;
        b.style.height = size;
        b.style.left = Math.random() * 100 + '%';
        b.style.setProperty('--speed', Math.random() * 8 + 7 + 's');
        b.style.setProperty('--wobble-speed', Math.random() * 2 + 2 + 's');
        if (!initial) b.style.bottom = '-100px';
        else b.style.bottom = Math.random() * 100 + 'vh';
        
        container.appendChild(b);
        b.addEventListener('animationend', () => b.remove());
      },
      bind() { if(document.getElementById('s-input')) document.getElementById('s-input').oninput = (e) => { this.q = e.target.value; this.refreshGrid(true); }; }
  };

  C.init(); window.C = C;
})();
</script>
</body>
</html>
